<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLC — Business Diagnostic</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0b0e14;
  --bg2:    #111520;
  --bg3:    #161c2a;
  --bg4:    #1c2336;
  --b:      rgba(255,255,255,0.07);
  --b2:     rgba(255,255,255,0.13);
  --text:   #e2e8f0;
  --muted:  rgba(226,232,240,0.50);
  --dim:    rgba(226,232,240,0.22);
  --blue:   #3b82f6;
  --blue2:  rgba(59,130,246,0.12);
  --blue3:  rgba(59,130,246,0.06);
  --amber:  #f59e0b;
  --amber2: rgba(245,158,11,0.12);
  --rose:   #f43f5e;
  --rose2:  rgba(244,63,94,0.12);
  --green:  #22c55e;
  --green2: rgba(34,197,94,0.10);
  --violet: #8b5cf6;
  --violet2:rgba(139,92,246,0.10);
  --cyan:   #06b6d4;
  --indigo: #6366f1;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.5;
  min-height:100vh;overflow-x:hidden;
}
.shell{max-width:680px;margin:0 auto;padding:36px 20px 100px;}

/* ── HEADER ── */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:36px;padding-bottom:18px;border-bottom:1px solid var(--b);
}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{
  width:30px;height:30px;border-radius:7px;background:var(--blue);
  display:flex;align-items:center;justify-content:center;
}
.logo-mark svg{display:block;}
.logo-name{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:13.5px;color:var(--text);letter-spacing:-0.01em;}
.logo-sub{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;margin-top:1px;}
.hdr-right{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;}

/* ── PROGRESS ── */
.prog{margin-bottom:32px;}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.prog-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.prog-frac{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);}
.prog-track{height:2px;background:var(--b);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);}

/* ── ANIMATIONS ── */
@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* ── INTRO ── */
.intro-screen{animation:up .3s ease;}
.intro-eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--blue);margin-bottom:16px;font-weight:600;
}
.intro-title{
  font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:26px;
  color:var(--text);line-height:1.15;letter-spacing:-0.025em;margin-bottom:12px;
}
.intro-sub{
  font-size:13.5px;color:var(--muted);line-height:1.7;max-width:480px;margin-bottom:32px;
}
.intro-steps{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:32px;
}
.intro-step{
  background:var(--bg2);border:1px solid var(--b);border-radius:10px;
  padding:14px 16px;
}
.is-num{
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
  color:var(--blue);letter-spacing:.06em;margin-bottom:8px;
}
.is-title{font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.3;}
.is-desc{font-size:11px;color:var(--muted);line-height:1.5;}
.intro-cta-row{display:flex;align-items:center;gap:16px;}
.intro-note{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.05em;color:var(--dim);}

/* ── DIMENSION QUESTION ── */
.dim-screen{animation:up .22s ease;}
.dim-label{
  font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--dim);margin-bottom:12px;
}
.dim-q{
  background:var(--bg2);border:1px solid var(--b);border-radius:12px;
  padding:26px 26px 22px;margin-bottom:10px;
}
.dim-prompt{
  font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:17px;
  color:var(--text);line-height:1.4;margin-bottom:5px;letter-spacing:-0.01em;
}
.dim-sub{font-size:12px;color:var(--dim);margin-bottom:20px;line-height:1.55;font-style:italic;}
.dim-opts{display:flex;flex-direction:column;gap:8px;}
.dim-opt{
  display:flex;align-items:flex-start;gap:12px;
  padding:14px 16px;border:1px solid var(--b);border-radius:9px;
  background:var(--bg3);cursor:pointer;transition:all .12s;
  position:relative;overflow:hidden;
}
.dim-opt::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:transparent;transition:background .12s;
}
.dim-opt:hover{border-color:var(--b2);background:var(--bg4);}
.dim-opt.sel{border-color:rgba(59,130,246,.4);background:var(--blue3);}
.dim-opt.sel::before{background:var(--blue);}
.opt-key{
  width:24px;height:24px;border-radius:6px;border:1px solid var(--b2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);
  transition:all .12s;margin-top:1px;
}
.dim-opt.sel .opt-key{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600;}
.opt-body{flex:1;}
.opt-title{font-weight:600;font-size:13px;color:var(--text);margin-bottom:3px;line-height:1.4;}
.opt-desc{font-size:11.5px;color:var(--muted);line-height:1.5;}

/* ── ARCHETYPE REVEAL ── */
.reveal-screen{animation:up .3s ease;}
.reveal-kicker{
  font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--muted);margin-bottom:14px;
}
.reveal-card{
  border-radius:12px;padding:28px 28px 24px;margin-bottom:14px;
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#0f172a 0%,#0d1117 100%);
  border:1px solid rgba(255,255,255,0.09);
  box-shadow:0 0 0 1px rgba(59,130,246,0.08),0 8px 32px rgba(0,0,0,0.4);
}
.reveal-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--blue),var(--violet),var(--cyan));
}
.rc-eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.14em;
  text-transform:uppercase;color:rgba(255,255,255,0.28);margin-bottom:10px;
}
.rc-name{
  font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:26px;
  color:#fff;line-height:1.1;letter-spacing:-0.025em;margin-bottom:5px;
}
.rc-code{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;
  color:#60a5fa;letter-spacing:.07em;margin-bottom:16px;
}
.rc-desc{
  font-size:13px;color:rgba(255,255,255,0.55);line-height:1.7;
  max-width:500px;padding-bottom:18px;margin-bottom:0;
}
.rc-dims{
  display:flex;flex-wrap:wrap;gap:5px;
  padding-top:16px;border-top:1px solid rgba(255,255,255,0.07);
}
.rc-dim{
  display:flex;align-items:center;gap:4px;padding:3px 9px;
  border-radius:4px;background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.04em;
}
.rcd-l{color:rgba(255,255,255,0.28);}
.rcd-v{color:rgba(255,255,255,0.7);font-weight:600;}

.reveal-bridge{
  background:var(--bg2);border:1px solid var(--b);border-radius:9px;
  padding:14px 18px;margin-bottom:20px;
}
.rb-text{font-size:13px;color:var(--muted);line-height:1.65;}
.rb-text strong{color:var(--text);font-weight:600;}

/* ── FRICTION SCREEN ── */
.frx-screen{animation:up .22s ease;}
.frx-tracker{display:flex;gap:4px;margin-bottom:6px;}
.frx-seg{
  height:2px;flex:1;border-radius:2px;background:var(--b);
  position:relative;overflow:hidden;
}
.frx-seg.done{background:var(--blue);}
.frx-seg.active::after{
  content:'';position:absolute;left:0;top:0;bottom:0;width:50%;
  background:var(--blue);border-radius:2px;
  animation:pulse 1.6s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.3;}50%{opacity:.8;}}
.frx-tcount{
  font-family:'JetBrains Mono',monospace;font-size:8.5px;
  letter-spacing:.06em;color:var(--dim);margin-bottom:18px;text-align:right;
}
.frx-hdr{margin-bottom:14px;}
.frx-cat{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.1em;
  text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:9px;
  font-weight:600;
}
.frx-title{
  font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:18px;
  color:var(--text);margin-bottom:4px;letter-spacing:-0.01em;
}
.frx-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:18px;}
.frx-card{
  background:var(--bg2);border:1px solid var(--b);border-radius:11px;
  padding:20px 22px;margin-bottom:10px;
}
.frx-items{display:flex;flex-direction:column;}
.frx-item{padding:13px 0;border-bottom:1px solid var(--b);}
.frx-item:last-child{border-bottom:none;padding-bottom:0;}
.frx-item:first-child{padding-top:0;}
.frx-stmt{
  font-size:13px;color:var(--text);line-height:1.55;
  margin-bottom:10px;font-weight:500;
}
.rating-row{display:flex;gap:6px;}
.r-btn{
  flex:1;padding:8px 6px;border:1px solid var(--b);border-radius:8px;
  background:var(--bg3);cursor:pointer;transition:all .12s;text-align:center;
  font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;font-size:11.5px;
  color:var(--muted);line-height:1.3;
}
.r-btn:hover{border-color:var(--b2);color:var(--text);}
.r-btn.r0.sel{background:rgba(255,255,255,0.06);border-color:var(--b2);color:var(--dim);}
.r-btn.r1.sel{background:var(--amber2);border-color:rgba(245,158,11,.3);color:var(--amber);}
.r-btn.r2.sel{background:var(--rose2);border-color:rgba(244,63,94,.3);color:var(--rose);}
.frx-done-note{
  text-align:center;margin-top:8px;
  font-size:11.5px;color:var(--green);font-weight:600;
  animation:fadeIn .25s ease;
}
.frx-note{
  text-align:center;margin-top:8px;
  font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.06em;color:var(--dim);
}

/* ── NAV ── */
.nav{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:18px;padding-top:18px;border-top:1px solid var(--b);
}
.btn-back{
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--dim);background:none;border:none;
  cursor:pointer;padding:8px 0;transition:color .12s;
}
.btn-back:hover{color:var(--muted);}
.btn-back:disabled{opacity:.2;cursor:default;}
.btn-next{
  font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;
  padding:10px 22px;background:var(--blue);color:#fff;
  border:none;border-radius:8px;cursor:pointer;transition:all .12s;
  display:flex;align-items:center;gap:5px;
}
.btn-next:hover{background:#2563eb;}
.btn-next:disabled{background:var(--bg4);color:var(--dim);cursor:default;}

/* ── RESULT ── */
.result{animation:up .35s ease;}

.arch-card{
  background:linear-gradient(135deg,#0f172a 0%,#0d1117 100%);
  border:1px solid rgba(255,255,255,0.09);border-radius:12px;
  padding:28px;margin-bottom:4px;position:relative;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,0.35);
}
.arch-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--blue),var(--cyan),var(--violet));
}
.arch-kicker{
  font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.14em;
  text-transform:uppercase;color:rgba(255,255,255,0.28);margin-bottom:10px;
}
.arch-name{
  font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:22px;
  color:#fff;line-height:1.15;margin-bottom:4px;letter-spacing:-0.02em;
}
.arch-code{
  font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(96,165,250,0.8);
  letter-spacing:.06em;margin-bottom:14px;
}
.arch-desc{font-size:12.5px;color:rgba(255,255,255,0.5);line-height:1.7;max-width:540px;}
.arch-dims{
  display:flex;flex-wrap:wrap;gap:5px;
  margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.07);
}
.arch-dim{
  display:flex;align-items:center;gap:4px;padding:3px 8px;
  border-radius:4px;background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  font-family:'JetBrains Mono',monospace;font-size:7.5px;letter-spacing:.04em;
}
.adl{color:rgba(255,255,255,0.28);}
.adv{color:rgba(255,255,255,0.72);font-weight:600;}

/* Insight bridge */
.insight-bridge{
  background:var(--bg2);border:1px solid var(--b);border-radius:10px;
  padding:16px 20px;margin:10px 0 14px;
  border-left:3px solid var(--rose);
}
.ib-tag{
  font-family:'JetBrains Mono',monospace;font-size:7.5px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--rose);margin-bottom:6px;font-weight:600;
}
.ib-line{
  font-size:14px;font-weight:700;color:var(--text);
  letter-spacing:-0.01em;line-height:1.35;margin-bottom:4px;
}
.ib-sub{font-size:12px;color:var(--muted);line-height:1.6;}

/* Spider */
.spider-wrap{
  background:var(--bg2);border:1px solid var(--b);border-radius:12px;
  padding:24px;margin-bottom:12px;
}
.spider-head{
  display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;
}
.spider-title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14px;color:var(--text);letter-spacing:-0.01em;}
.spider-sub{font-size:11.5px;color:var(--muted);margin-top:2px;}
.spider-legend{display:flex;flex-direction:column;gap:5px;align-items:flex-end;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--muted);}
.leg-dot{width:7px;height:7px;border-radius:50%;}
.spider-container{display:flex;justify-content:center;margin-bottom:18px;}
svg.spider{overflow:visible;}
.axis-bars{display:flex;flex-direction:column;gap:7px;}
.axis-row{display:flex;align-items:center;gap:10px;}
.axis-name{
  font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.05em;
  text-transform:uppercase;color:var(--muted);width:82px;flex-shrink:0;text-align:right;
}
.axis-track{flex:1;height:3px;background:var(--b);border-radius:2px;overflow:hidden;}
.axis-bar{height:100%;border-radius:2px;transition:width 1s cubic-bezier(.4,0,.2,1);}
.axis-pct{
  font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--dim);
  width:30px;flex-shrink:0;text-align:right;
}
.axis-interp{font-size:10.5px;color:var(--muted);width:120px;flex-shrink:0;}

/* r-section head */
.r-sec{
  font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--muted);
  margin:20px 0 10px;display:flex;align-items:center;gap:8px;
}
.r-sec::after{content:'';flex:1;height:1px;background:var(--b);}

/* hero module */
.mod-hero{
  background:var(--bg2);border:1px solid var(--b2);border-radius:11px;
  padding:22px 24px;margin-bottom:10px;position:relative;overflow:hidden;
}
.mod-hero::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--blue);
}
.mod-hero-tag{
  font-family:'JetBrains Mono',monospace;font-size:7.5px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--blue);margin-bottom:8px;font-weight:600;
}
.mod-hero-headline{
  font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14.5px;
  color:var(--text);line-height:1.35;margin-bottom:12px;letter-spacing:-0.01em;
}
.scenario-box{
  background:var(--bg3);border:1px solid var(--b);border-radius:8px;
  padding:13px 15px;margin-bottom:10px;
}
.scenario-label{
  font-family:'JetBrains Mono',monospace;font-size:7.5px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--amber);margin-bottom:5px;font-weight:600;
}
.scenario-text{font-size:12px;color:var(--muted);line-height:1.65;}
.scenario-text em{color:var(--text);font-style:normal;font-weight:600;}
.mod-solution{
  display:flex;align-items:flex-start;gap:10px;
  padding:11px 14px;background:var(--blue2);border-radius:7px;
  border:1px solid rgba(59,130,246,.2);
}
.mod-name-pill{
  font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.04em;
  color:var(--blue);font-weight:600;flex-shrink:0;padding-top:1px;
}
.mod-solve-text{font-size:12px;color:var(--muted);line-height:1.55;}

/* secondary modules */
.mod-secondary{
  background:var(--bg2);border:1px solid var(--b);border-radius:10px;
  padding:14px 16px;margin-bottom:8px;
  display:flex;align-items:flex-start;gap:10px;
  position:relative;overflow:hidden;
}
.mod-secondary::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--amber);
}
.sec-pill{
  padding:2px 7px;border-radius:4px;background:var(--amber2);
  font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--amber);flex-shrink:0;margin-top:2px;font-weight:600;
}
.sec-body{flex:1;}
.sec-name{font-weight:700;font-size:12.5px;color:var(--text);margin-bottom:3px;}
.sec-apply{font-size:11.5px;color:var(--muted);line-height:1.5;margin-bottom:4px;}
.sec-onboard{font-size:11px;color:rgba(59,130,246,0.7);line-height:1.4;}

/* pricing */
.pricing-card{
  background:var(--bg2);border:1px solid rgba(59,130,246,.2);
  border-radius:12px;padding:22px 24px;margin-top:12px;
  display:flex;align-items:center;justify-content:space-between;
  gap:18px;flex-wrap:wrap;position:relative;overflow:hidden;
}
.pricing-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--blue);
}
.p-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);margin-bottom:4px;font-weight:600;}
.p-price{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:26px;color:var(--text);line-height:1;}
.p-period{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-top:3px;}
.p-basis{font-size:11.5px;color:var(--muted);line-height:1.6;max-width:240px;}
.btn-waitlist{
  font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;
  padding:12px 26px;background:var(--blue);color:#fff;
  border:none;border-radius:8px;cursor:pointer;transition:all .12s;
  white-space:nowrap;flex-shrink:0;
}
.btn-waitlist:hover{background:#2563eb;transform:translateY(-1px);}
.btn-restart{
  display:block;margin:14px auto 0;font-family:'JetBrains Mono',monospace;
  font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--dim);background:none;border:none;cursor:pointer;transition:color .12s;
}
.btn-restart:hover{color:var(--muted);}

@media(max-width:540px){
  .intro-steps{grid-template-columns:1fr;}
  .dim-opts{gap:6px;}
  .rating-row{flex-direction:column;}
  .pricing-card{flex-direction:column;align-items:flex-start;}

function getArchCode() {
  const { stage, model, growth, marketing, ops } = ST.dims;
  const g = stage === 'P' ? 'B' : (growth || 'B');
  const o = stage === 'P' ? 'X' : (ops || 'X');
  return `${stage}-${model}-${g}-${marketing}-${o}`;
}
function getAxisScore(catId) {
  const cat = FRICTION_CATS.find(c => c.id === catId);
  if (!cat) return 0;
  const ratings = ST.frx[catId] || {};
  let total = 0;
  cat.items.forEach(item => { total += (ratings[item.id] || 0); });
  return Math.max(15, Math.round((total / (cat.items.length * 2)) * 100));
}
function getFrxSummary() {
  return FRICTION_CATS.map(cat => ({
    catId:cat.id, axis:cat.axis, color:cat.color,
    score: getAxisScore(cat.id),
    rawScore: cat.items.reduce((a,item) => a + (ST.frx[cat.id]?.[item.id] || 0), 0),
  })).sort((a,b) => b.score - a.score);
}
function isFrxScreenComplete() {
  const cat = FRICTION_CATS[ST.frxIdx];
  const ratings = ST.frx[cat.id] || {};
  return cat.items.every(item => ratings[item.id] !== undefined);
}
function totalScreens() { return 1 + DIMS.length + 1 + FRICTION_CATS.length; }
function currentScreen() {
  if (ST.phase === 'p1intro') return 0;
  if (ST.phase === 'dim') return 1 + ST.dimIdx;
  if (ST.phase === 'p2intro') return 1 + DIMS.length;
  if (ST.phase === 'frx') return 1 + DIMS.length + 1 + ST.frxIdx;
  return totalScreens();
}
function updateProgress() {
  const total = totalScreens();
  const cur = currentScreen();
  document.getElementById('prog-fill').style.width = Math.round((cur/total)*100) + '%';
  const labels = { p1intro:'', dim:'Phase 1 — Business Profile', p2intro:'Profile complete', frx:'Phase 2 — Friction Map', result:'Complete' };
  document.getElementById('prog-label').textContent = labels[ST.phase] || '';
  document.getElementById('prog-frac').textContent = (ST.phase !== 'p1intro' && ST.phase !== 'result') ? `${cur} / ${total}` : ST.phase === 'result' ? `${total} / ${total}` : '';
  if (ST.phase === 'result') document.getElementById('prog-fill').style.width = '100%';
}

  const sel = ST.dims[q.id];
  const opts = q.opts.map(o => `
    <div class="dim-opt ${sel === o.key ? 'sel' : ''}" onclick="setDim('${q.id}','${o.key}')">
      <div class="opt-key">${o.letter}</div>
      <div class="opt-body">
        <div class="opt-title">${o.title}</div>
        <div class="opt-desc">${o.desc}</div>
      </div>
    </div>`).join('');
  return `<div class="dim-screen">
    <div class="dim-label">${q.label}</div>
    <div class="dim-q">
      <div class="dim-prompt">${q.prompt}</div>
      ${q.sub ? `<div class="dim-sub">${q.sub}</div>` : ''}
      <div class="dim-opts">${opts}</div>
    </div>
    <div class="nav">
      <button class="btn-back" onclick="back()" ${ST.dimIdx === 0 ? 'disabled' : ''}>← Back</button>
      <button class="btn-next" onclick="next()" ${!sel ? 'disabled' : ''}>${ST.dimIdx === DIMS.length-1 ? 'See your archetype →' : 'Next →'}</button>
    </div>
  </div>`;
}

// ── ARCHETYPE REVEAL ──────────────────────────────────────────────────────────
// The MBTI moment. Full weight. Archetype shown completely before Phase 2 begins.
// Bridge reframes Phase 2 as "now let's find where it hurts — for this specific archetype."
function renderReveal() {
  const code = getArchCode();
  const arch = ARCHETYPES[code] || { name:'Custom Profile', tier:'Mid', desc:'Your configuration has been calculated from your answers.' };
  const dimPills = Object.entries(ST.dims).map(([k,v]) =>
    `<div class="rc-dim"><span class="rcd-l">${k}</span><span class="rcd-v">${DIM_LABELS[k]?.[v]||v}</span></div>`
  ).join('');
  const bridgeLine = arch.tier === 'Entry'
    ? `Now we map the friction — the gaps between your plan and a launch that holds.`
    : `Now we find where the operation is quietly bleeding. Seven categories. Rate what's real, not what you're working on fixing.`;
  return `<div class="reveal-screen">
    <div class="reveal-kicker">Phase 1 complete · Your archetype</div>
    <div class="reveal-card">
      <div class="rc-eyebrow">SLC Business Archetype · ${code}</div>
      <div class="rc-name">${arch.name}</div>
      <div class="rc-code">${code} · ${arch.tier} Configuration</div>
      <div class="rc-desc">${arch.desc}</div>
      <div class="rc-dims">${dimPills}</div>
    </div>
    <div class="reveal-bridge">
      <div class="rb-text">${bridgeLine}</div>
    </div>
    <div class="nav" style="border:none;padding-top:0;margin-top:0;">
      <button class="btn-back" onclick="back()">← Edit profile</button>
      <button class="btn-next" onclick="next()">Start friction map →</button>
    </div>
  </div>`;
}

// ── FRICTION SCREEN ───────────────────────────────────────────────────────────
// 7-segment tracker: accumulation framing, not countdown.
// Completion note fires on all-rated — micro-reward before advancing.
function renderFrx() {
  const cat = FRICTION_CATS[ST.frxIdx];
  const ratings = ST.frx[cat.id] || {};
  const done = isFrxScreenComplete();
  const segs = FRICTION_CATS.map((c,i) => {
    let cls = 'frx-seg';
    if (i < ST.frxIdx) cls += ' done';
    else if (i === ST.frxIdx) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');
  const items = cat.items.map(item => {
    const r = ratings[item.id];
    return `<div class="frx-item">
      <div class="frx-stmt">${item.stmt}</div>
      <div class="rating-row">
        <button class="r-btn r0 ${r===0?'sel':''}" onclick="setFrx('${cat.id}','${item.id}',0)">Not us</button>
        <button class="r-btn r1 ${r===1?'sel':''}" onclick="setFrx('${cat.id}','${item.id}',1)">We feel this</button>
        <button class="r-btn r2 ${r===2?'sel':''}" onclick="setFrx('${cat.id}','${item.id}',2)">This is a real issue</button>
      </div>
    </div>`;
  }).join('');
  return `<div class="frx-screen">
    <div class="frx-tracker">${segs}</div>
    <div class="frx-tcount">${ST.frxIdx + 1} of ${FRICTION_CATS.length} mapped</div>
    <div class="frx-hdr">
      <div class="frx-cat" style="background:${cat.colorBg};color:${cat.color};">${cat.axis}</div>
      <div class="frx-title">${cat.label}</div>
      <div class="frx-desc">${cat.desc}</div>
    </div>
    <div class="frx-card"><div class="frx-items">${items}</div></div>
    <div class="nav">
      <button class="btn-back" onclick="back()" ${ST.frxIdx===0?'disabled':''}>← Back</button>
      <button class="btn-next" onclick="next()" ${!done?'disabled':''}>${ST.frxIdx===FRICTION_CATS.length-1?'See results →':'Next →'}</button>
    </div>
    ${done
      ? `<div class="frx-done-note">✓ ${cat.axis} mapped</div>`
      : `<div class="frx-note">Rate every statement to continue</div>`}
  </div>`;
}

// ── SPIDER SVG ────────────────────────────────────────────────────────────────
function buildSpiderSVG(scores) {
  const N=scores.length, CX=180, CY=180, R=135;
  const angles = scores.map((_,i)=>(i/N)*2*Math.PI-Math.PI/2);
  const pt=(r,i)=>({ x:CX+r*Math.cos(angles[i]), y:CY+r*Math.sin(angles[i]) });
  const rings = [.25,.5,.75,1].map(r=>{
    const pts=scores.map((_,i)=>pt(R*r,i));
    return `<polygon points="${pts.map(p=>`${p.x},${p.y}`).join(' ')}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;
  }).join('');
  const axes = scores.map((_,i)=>{
    const p=pt(R,i);
    return `<line x1="${CX}" y1="${CY}" x2="${p.x}" y2="${p.y}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;
  }).join('');
  const dataPts = scores.map((s,i)=>pt(R*(s.score/100),i));
  const poly = dataPts.map(p=>`${p.x},${p.y}`).join(' ');
  const dots = dataPts.map((p,i)=>{
    const hi=scores[i].score>=60;
    return `<circle cx="${p.x}" cy="${p.y}" r="${hi?5:3}" fill="${hi?scores[i].color:'rgba(255,255,255,0.2)'}" opacity="${hi?1:.6}"/>`;
  }).join('');
  const labels = scores.map((s,i)=>{
    const p=pt(R*1.24,i);
    const hi=s.score>=60;
    return `<text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="middle"
      font-family="JetBrains Mono,monospace" font-size="9" font-weight="${hi?'600':'400'}"
      letter-spacing=".08em" fill="${hi?s.color:'rgba(226,232,240,0.3)'}"
      transform="rotate(${(angles[i]*180/Math.PI)>90&&(angles[i]*180/Math.PI)<270?180:0},${p.x},${p.y})"
    >${s.axis.toUpperCase()}</text>`;
  }).join('');
  const pctLabels = dataPts.map((p,i)=>{
    if (!scores[i].rawScore) return '';
    return `<text x="${p.x}" y="${p.y-10}" text-anchor="middle"
      font-family="JetBrains Mono,monospace" font-size="8" fill="${scores[i].color}" opacity=".85"
    >${scores[i].score}%</text>`;
  }).join('');
  return `<svg class="spider" width="360" height="360" viewBox="0 0 360 360">
    <defs>
      <radialGradient id="sg" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="rgba(59,130,246,0.14)"/>
        <stop offset="100%" stop-color="rgba(59,130,246,0.02)"/>
      </radialGradient>
    </defs>
    ${rings}${axes}
    <polygon points="${poly}" fill="url(#sg)" stroke="rgba(59,130,246,0.55)" stroke-width="1.5" stroke-linejoin="round"/>
    ${dots}${pctLabels}${labels}
  </svg>`;
}

// ── RESULT ────────────────────────────────────────────────────────────────────
// Sequence: archetype (identity) → insight bridge (cost) → spider (proof) → prescription (fix)
function renderResult() {
  const code = getArchCode();
  const arch = ARCHETYPES[code] || { name:'Your Business Profile', tier:'Mid', desc:'Your configuration has been calculated from your answers.' };
  const summary = getFrxSummary();
  const price = TIER_PRICE[arch.tier] || '฿4,900';
  const dimPills = Object.entries(ST.dims).map(([k,v]) =>
    `<div class="arch-dim"><span class="adl">${k}</span><span class="adv">${DIM_LABELS[k]?.[v]||v}</span></div>`
  ).join('');
  const spiderData = FRICTION_CATS.map(cat=>({
    axis:cat.axis, score:getAxisScore(cat.id), color:cat.color,
    rawScore:cat.items.reduce((a,i)=>a+(ST.frx[cat.id]?.[i.id]||0),0)
  }));
  function interpText(s){
    if(s<=20) return 'Minimal';
    if(s<=40) return 'Low';
    if(s<=60) return 'Moderate';
    if(s<=80) return 'High';
    return 'Critical';
  }
  function barColor(s){ return s<=30?'#4f46e5':s<=55?'#f59e0b':'#f43f5e'; }
  const axisBars = [...spiderData].sort((a,b)=>b.score-a.score).map(s =>
    `<div class="axis-row">
      <div class="axis-name">${s.axis}</div>
      <div class="axis-track"><div class="axis-bar" style="width:${s.score}%;background:${barColor(s.score)};"></div></div>
      <div class="axis-pct">${s.score}%</div>
      <div class="axis-interp">${interpText(s.score)}</div>
    </div>`
  ).join('');
  const top = summary[0];
  const pres = PRESCRIPTIONS[top.catId];
  const scen = pres?.getScenario(arch);
  const secondary = summary.slice(1).filter(s=>s.rawScore>0).map(s=>{
    const p=PRESCRIPTIONS[s.catId]; if(!p) return '';
    const cat=FRICTION_CATS.find(c=>c.id===s.catId);
    return `<div class="mod-secondary">
      <div class="sec-pill">Included</div>
      <div class="sec-body">
        <div class="sec-name">${p.module}</div>
        <div class="sec-apply">Friction in <em style="color:${cat?.color||'var(--blue)'}">${s.axis}</em> — ${p.secondaryModules?.length?`also includes ${p.secondaryModules.slice(0,2).join(', ')}.`:''}</div>
        <div class="sec-onboard">Configured to your specific operation, not a generic setup.</div>
      </div>
    </div>`;
  }).join('');
  const flagged = summary.filter(s=>s.rawScore>0).length;
  // Insight bridge copy — specific to the top axis
  const costByAxis = {
    planning:   'unvalidated assumptions that become structural problems at launch',
    finance:    'cash surprises that arrive when it is already too late to act',
    operations: 'manual overhead that scales with every new order — invisible until it breaks',
    marketing:  'spend without attribution — investing without knowing the return',
    customers:  'leads and repeat revenue falling through the gaps between platforms',
    people:     'process fragility and compliance exposure that compounds as you grow',
    strategy:   'daily effort without measurable direction — busy without forward movement',
  };
  const cost = costByAxis[top.catId] || 'friction that compounds quietly over time';
  return `<div class="result">
    <div class="arch-card">
      <div class="arch-kicker">Diagnostic Result · ${code}</div>
      <div class="arch-name">${arch.name}</div>
      <div class="arch-code">${code} · ${arch.tier} Configuration</div>
      <div class="arch-desc">${arch.desc}</div>
      <div class="arch-dims">${dimPills}</div>
    </div>

    <div class="insight-bridge">
      <div class="ib-tag">Primary signal</div>
      <div class="ib-line">${top.axis} friction at ${top.score}% — your highest-cost gap.</div>
      <div class="ib-sub">For ${arch.name}, that means ${cost}.</div>
    </div>

    <div class="spider-wrap">
      <div class="spider-head">
        <div>
          <div class="spider-title">Friction Profile</div>
          <div class="spider-sub">All seven axes — scored from your answers</div>
        </div>
        <div class="spider-legend">
          <div class="leg-item"><div class="leg-dot" style="background:var(--rose)"></div>High</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--amber)"></div>Moderate</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--indigo)"></div>Low</div>
        </div>
      </div>
      <div class="spider-container" id="spider-container"></div>
      <div class="axis-bars">${axisBars}</div>
    </div>

    ${pres&&scen?`
    <div class="r-sec">Priority module · ${top.axis}</div>
    <div class="mod-hero">
      <div class="mod-hero-tag">◈ ${top.axis} · ${top.score}% friction</div>
      <div class="mod-hero-headline">${scen.headline}</div>
      <div class="scenario-box">
        <div class="scenario-label">The situation</div>
        <div class="scenario-text">${scen.situation}</div>
      </div>
      <div class="mod-solution">
        <div class="mod-name-pill">${pres.module}</div>
        <div class="mod-solve-text">${scen.resolution}</div>
      </div>
    </div>`:''}

    ${secondary?`<div class="r-sec">Additional modules · your configuration</div>${secondary}`:''}

    <div class="pricing-card">
      <div>
        <div class="p-label">Your SLC Plan</div>
        <div class="p-price">${price}<span style="font-size:13px;font-weight:400;color:var(--muted)">/mo</span></div>
        <div class="p-period">${arch.tier} · ${flagged} of 7 friction areas flagged</div>
      </div>
      <div class="p-basis">Configuration built from your answers. Adjusted for your archetype and friction profile.</div>
      <button class="btn-waitlist" onclick="alert('Waitlist coming soon.')">Join the Waitlist →</button>
    </div>
    <button class="btn-restart" onclick="restart()">↺ Retake Diagnostic</button>
  </div>`;
}
function initSpider() {
  const data = FRICTION_CATS.map(cat=>({
    axis:cat.axis, score:getAxisScore(cat.id), color:cat.color,
    rawScore:cat.items.reduce((a,i)=>a+(ST.frx[cat.id]?.[i.id]||0),0)
  }));
  const c = document.getElementById('spider-container');
  if(c) c.innerHTML = buildSpiderSVG(data);
}

// ══════════════════════════════════════════════════════════════════════════════
// INTERACTIONS — UNTOUCHED
// ══════════════════════════════════════════════════════════════════════════════
function setDim(id,val){ ST.dims[id]=val; render(); }
function setFrx(catId,itemId,val){
  if(!ST.frx[catId]) ST.frx[catId]={};
  ST.frx[catId][itemId]=val; render();
}
function next(){
  if(ST.phase==='p1intro'){ ST.phase='dim'; ST.dimIdx=0; }
  else if(ST.phase==='dim'){
    if(ST.dimIdx<DIMS.length-1) ST.dimIdx++;
    else ST.phase='p2intro';
  }
  else if(ST.phase==='p2intro'){ ST.phase='frx'; ST.frxIdx=0; }
  else if(ST.phase==='frx'){
    if(ST.frxIdx<FRICTION_CATS.length-1) ST.frxIdx++;
    else ST.phase='result';
  }
  render();
}
function back(){
  if(ST.phase==='dim'){
    if(ST.dimIdx>0) ST.dimIdx--;
    else ST.phase='p1intro';
  }
  else if(ST.phase==='p2intro'){ ST.phase='dim'; ST.dimIdx=DIMS.length-1; }
  else if(ST.phase==='frx'){
    if(ST.frxIdx>0) ST.frxIdx--;
    else ST.phase='p2intro';
  }
  render();
}
function restart(){
  ST={ phase:'p1intro', dimIdx:0, dims:{}, frxIdx:0, frx:{} };
  window.scrollTo(0,0); render();
}
render();
</script>
