<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLC — Business Diagnostic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
<style>
:root {
  /* ── Website surfaces ── */
  --bg:           #f5f7f9;
  --surface:      #ffffff;
  --surface-low:  #eef1f3;
  --surface-high: #e6eaed;
  --border:       rgba(44,47,49,0.10);
  --border-med:   rgba(44,47,49,0.16);
  /* ── Website ink ── */
  --text:         #2c2f31;
  --muted:        #6b7075;
  --faint:        #9ea3a8;
  /* ── Website primary ── */
  --primary:      #0050d4;
  --primary-grad: linear-gradient(135deg,#0050d4 0%,#3a73e6 55%,#7b9cff 100%);
  --primary-soft: rgba(0,80,212,0.07);
  --primary-mid:  rgba(0,80,212,0.14);
  /* ── Website inverse (dark panels) ── */
  --inv:          #14171a;
  --inv-2:        #1c2024;
  --on-inv:       #e8ecef;
  --on-inv-mute:  #9aa1a8;
  /* ── Accents ── */
  --green:        #1f8a5b;
  --green-soft:   rgba(31,138,91,0.10);
  --amber:        #b07604;
  --amber-soft:   rgba(176,118,4,0.10);
  --rose:         #c62b3b;
  --rose-soft:    rgba(198,43,59,0.10);
  --violet:       #5b21b6;
  --violet-soft:  rgba(91,33,182,0.08);
  --indigo:       #4338ca;
  --cyan:         #0e7490;
  /* ── Radii / shadows ── */
  --r-sm: 4px; --r-md: 10px; --r-lg: 14px; --r-xl: 20px;
  --shadow-sm: 0 1px 4px rgba(44,47,49,0.06), 0 4px 12px rgba(44,47,49,0.04);
  --shadow-md: 0 4px 16px rgba(44,47,49,0.08), 0 8px 24px rgba(44,47,49,0.05);
}

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.55;
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
.shell{max-width:700px;margin:0 auto;padding:36px 24px 100px;}

/* ── HEADER ── */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border);
}
.logo{display:flex;align-items:center;gap:12px;}
.logo-mark{
  width:32px;height:32px;border-radius:var(--r-md);
  background:var(--primary-grad);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(0,80,212,0.25);
}
.logo-mark svg{display:block;}
.logo-name{
  font-family:'Manrope',sans-serif;font-weight:800;font-size:14px;
  color:var(--text);letter-spacing:-0.02em;
}
.logo-sub{
  font-family:'Inter',sans-serif;font-weight:500;font-size:11px;
  letter-spacing:.04em;color:var(--faint);text-transform:uppercase;margin-top:1px;
}
.hdr-right{display:flex;align-items:center;gap:10px;}
.hdr-meta{
  font-family:'JetBrains Mono',monospace;font-size:8px;
  letter-spacing:.1em;color:var(--faint);text-transform:uppercase;
}
.lang-toggle{
  display:flex;border:1px solid var(--border-med);border-radius:var(--r-sm);overflow:hidden;
}
.lang-btn{
  font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.06em;
  padding:5px 11px;background:none;border:none;cursor:pointer;
  color:var(--muted);transition:all .12s;
}
.lang-btn.active{background:var(--primary);color:#fff;}
.lang-btn:not(.active):hover{color:var(--text);background:var(--surface-low);}

/* ── PROGRESS ── */
.prog{margin-bottom:32px;}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.prog-label{
  font-family:'Inter',sans-serif;font-weight:600;font-size:10px;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
}
.prog-frac{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--faint);}
.prog-track{height:2px;background:var(--surface-high);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--primary);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);}

/* ── ANIMATIONS ── */
@keyframes up{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(31,138,91,.4);}50%{box-shadow:0 0 0 8px rgba(31,138,91,0);}}

/* ── INTRO ── */
.intro-screen{animation:up .3s ease;}
.intro-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-family:'Inter',sans-serif;font-weight:600;font-size:11px;
  letter-spacing:.12em;text-transform:uppercase;color:var(--primary);
  margin-bottom:18px;
}
.intro-eyebrow .live-dot{
  width:7px;height:7px;border-radius:50%;background:var(--green);
  box-shadow:0 0 0 3px rgba(31,138,91,.15);
  animation:pulse-dot 2s infinite;
}
.intro-title{
  font-family:'Manrope',sans-serif;font-weight:800;font-size:28px;
  color:var(--text);line-height:1.12;letter-spacing:-0.03em;margin-bottom:14px;
}
.intro-title em{font-style:normal;color:var(--primary);}
.intro-sub{
  font-size:14.5px;color:var(--muted);line-height:1.7;
  max-width:500px;margin-bottom:32px;
}
.intro-steps{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:32px;
}
.intro-step{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:16px 18px;transition:box-shadow .15s;
}
.intro-step:hover{box-shadow:var(--shadow-sm);}
.is-num{
  font-family:'Inter',sans-serif;font-weight:700;font-size:10px;
  color:var(--primary);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;
}
.is-title{
  font-family:'Manrope',sans-serif;font-weight:700;font-size:13px;
  color:var(--text);margin-bottom:4px;line-height:1.3;
}
.is-desc{font-size:11.5px;color:var(--muted);line-height:1.5;}
.intro-cta-row{display:flex;align-items:center;gap:18px;}
.intro-note{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  letter-spacing:.05em;color:var(--faint);
}

/* ── DIMENSION QUESTION ── */
.dim-screen{animation:up .22s ease;}
.dim-label{
  font-family:'Inter',sans-serif;font-weight:600;font-size:10px;
  letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:14px;
}
.dim-q{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:28px;margin-bottom:12px;box-shadow:var(--shadow-sm);
}
.dim-prompt{
  font-family:'Manrope',sans-serif;font-weight:700;font-size:18px;
  color:var(--text);line-height:1.35;margin-bottom:6px;letter-spacing:-0.02em;
}
.dim-sub{font-size:12.5px;color:var(--faint);margin-bottom:22px;line-height:1.55;font-style:italic;}
.dim-opts{display:flex;flex-direction:column;gap:9px;}
.dim-opt{
  display:flex;align-items:flex-start;gap:14px;
  padding:14px 18px;border:1px solid var(--border);border-radius:var(--r-md);
  background:var(--bg);cursor:pointer;transition:all .12s;position:relative;overflow:hidden;
}
.dim-opt::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:transparent;transition:background .12s;
}
.dim-opt:hover{border-color:var(--border-med);background:var(--surface-low);}
.dim-opt.sel{border-color:rgba(0,80,212,.3);background:rgba(0,80,212,.04);}
.dim-opt.sel::before{background:var(--primary);}
.opt-key{
  width:26px;height:26px;border-radius:var(--r-sm);border:1px solid var(--border-med);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:'Manrope',sans-serif;font-size:11px;font-weight:700;
  color:var(--muted);transition:all .12s;margin-top:1px;
}
.dim-opt.sel .opt-key{
  background:var(--primary);border-color:var(--primary);color:#fff;
}
.opt-body{flex:1;}
.opt-title{
  font-family:'Manrope',sans-serif;font-weight:600;font-size:13.5px;
  color:var(--text);margin-bottom:3px;line-height:1.4;
}
.opt-desc{font-size:12px;color:var(--muted);line-height:1.5;}

/* ── ARCHETYPE REVEAL ── */
.reveal-screen{animation:up .3s ease;}
.reveal-kicker{
  font-family:'Inter',sans-serif;font-weight:600;font-size:10px;
  letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;
}
.reveal-card{
  border-radius:var(--r-xl);padding:32px;margin-bottom:14px;
  position:relative;overflow:hidden;
  background:var(--inv);
  border:1px solid rgba(255,255,255,0.06);
  box-shadow:var(--shadow-md);
}
.reveal-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--primary-grad);
}
.rc-eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.14em;
  text-transform:uppercase;color:rgba(255,255,255,0.28);margin-bottom:12px;
}
.rc-name{
  font-family:'Manrope',sans-serif;font-weight:800;font-size:28px;
  color:#fff;line-height:1.1;letter-spacing:-0.03em;margin-bottom:6px;
}
.rc-code{
  font-family:'JetBrains Mono',monospace;font-size:10.5px;
  color:rgba(123,156,255,0.85);letter-spacing:.07em;margin-bottom:18px;
}
.rc-desc{
  font-size:13.5px;color:rgba(255,255,255,0.52);line-height:1.7;
  max-width:520px;padding-bottom:20px;
}
.rc-dims{
  display:flex;flex-wrap:wrap;gap:6px;
  padding-top:18px;border-top:1px solid rgba(255,255,255,0.08);
}
.rc-dim{
  display:flex;align-items:center;gap:5px;padding:4px 10px;
  border-radius:var(--r-sm);background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.09);
  font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.04em;
}
.rcd-l{color:rgba(255,255,255,0.28);}
.rcd-v{color:rgba(255,255,255,0.72);font-weight:600;}
.reveal-bridge{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);
  padding:16px 20px;margin-bottom:22px;
}
.rb-text{font-size:13.5px;color:var(--muted);line-height:1.65;}
.rb-text strong{color:var(--text);font-weight:600;}

/* ── FRICTION SCREEN ── */
.frx-screen{animation:up .22s ease;}
.frx-tracker{display:flex;gap:4px;margin-bottom:6px;}
.frx-seg{
  height:2px;flex:1;border-radius:2px;background:var(--surface-high);
  position:relative;overflow:hidden;
}
.frx-seg.done{background:var(--primary);}
.frx-seg.active::after{
  content:'';position:absolute;left:0;top:0;bottom:0;width:60%;
  background:var(--primary);border-radius:2px;
  animation:frx-pulse 1.6s ease-in-out infinite;
}
@keyframes frx-pulse{0%,100%{opacity:.3;}50%{opacity:.9;}}
.frx-tcount{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  letter-spacing:.06em;color:var(--faint);margin-bottom:20px;text-align:right;
}
.frx-hdr{margin-bottom:16px;}
.frx-cat{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'Inter',sans-serif;font-size:10px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;
  border-radius:var(--r-sm);margin-bottom:10px;
}
.frx-title{
  font-family:'Manrope',sans-serif;font-weight:800;font-size:20px;
  color:var(--text);margin-bottom:5px;letter-spacing:-0.02em;
}
.frx-desc{font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:20px;}
.frx-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:22px 24px;margin-bottom:12px;box-shadow:var(--shadow-sm);
}
.frx-items{display:flex;flex-direction:column;}
.frx-item{padding:14px 0;border-bottom:1px solid var(--border);}
.frx-item:last-child{border-bottom:none;padding-bottom:0;}
.frx-item:first-child{padding-top:0;}
.frx-stmt{
  font-size:13.5px;color:var(--text);line-height:1.6;
  margin-bottom:11px;font-weight:500;
}
.rating-row{display:flex;gap:7px;}
.r-btn{
  flex:1;padding:8px 6px;border:1px solid var(--border);border-radius:var(--r-md);
  background:var(--bg);cursor:pointer;transition:all .12s;text-align:center;
  font-family:'Inter',sans-serif;font-weight:500;font-size:12px;
  color:var(--muted);line-height:1.3;
}
.r-btn:hover{border-color:var(--border-med);color:var(--text);background:var(--surface-low);}
.r-btn.r0.sel{
  background:var(--surface-high);border-color:var(--border-med);color:var(--muted);
}
.r-btn.r1.sel{
  background:rgba(176,118,4,0.08);border-color:rgba(176,118,4,0.28);color:var(--amber);
}
.r-btn.r2.sel{
  background:rgba(198,43,59,0.08);border-color:rgba(198,43,59,0.28);color:var(--rose);
}
.frx-done-note{
  text-align:center;margin-top:10px;
  font-size:12px;color:var(--green);font-weight:600;
  animation:fadeIn .25s ease;
}
.frx-note{
  text-align:center;margin-top:10px;
  font-family:'JetBrains Mono',monospace;font-size:9px;
  letter-spacing:.06em;color:var(--faint);
}

/* ── NAV ── */
.nav{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:20px;padding-top:20px;border-top:1px solid var(--border);
}
.btn-back{
  font-family:'Inter',sans-serif;font-weight:600;font-size:12px;
  letter-spacing:.04em;color:var(--faint);background:none;border:none;
  cursor:pointer;padding:8px 0;transition:color .12s;
}
.btn-back:hover{color:var(--muted);}
.btn-back:disabled{opacity:.25;cursor:default;}
.btn-next{
  font-family:'Manrope',sans-serif;font-weight:700;font-size:13.5px;
  padding:11px 24px;background:var(--primary-grad);color:#fff;
  border:none;border-radius:var(--r-md);cursor:pointer;transition:all .14s;
  display:flex;align-items:center;gap:6px;
  box-shadow:0 4px 14px rgba(0,80,212,0.28);
}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,80,212,0.35);}
.btn-next:disabled{
  background:var(--surface-high);color:var(--faint);
  cursor:default;box-shadow:none;transform:none;
}

/* ── RESULT ── */
.result{animation:up .35s ease;}

.arch-card{
  background:var(--inv);
  border:1px solid rgba(255,255,255,0.06);border-radius:var(--r-xl);
  padding:32px;margin-bottom:6px;position:relative;overflow:hidden;
  box-shadow:var(--shadow-md);
}
.arch-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--primary-grad);
}
.arch-kicker{
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.14em;
  text-transform:uppercase;color:rgba(255,255,255,0.28);margin-bottom:12px;
}
.arch-name{
  font-family:'Manrope',sans-serif;font-weight:800;font-size:24px;
  color:#fff;line-height:1.15;margin-bottom:5px;letter-spacing:-0.025em;
}
.arch-code{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  color:rgba(123,156,255,.8);letter-spacing:.06em;margin-bottom:16px;
}
.arch-desc{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.7;max-width:560px;}
.arch-dims{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-top:18px;padding-top:18px;border-top:1px solid rgba(255,255,255,0.08);
}
/* Clickable dim pills for back-navigation */
.arch-dim{
  display:flex;align-items:center;gap:5px;padding:4px 10px;
  border-radius:var(--r-sm);background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.09);
  font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.04em;
  cursor:pointer;transition:all .12s;
}
.arch-dim:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.18);}
.arch-dim-edit{
  font-size:7px;color:rgba(123,156,255,0.6);margin-left:2px;
  opacity:0;transition:opacity .12s;
}
.arch-dim:hover .arch-dim-edit{opacity:1;}
.adl{color:rgba(255,255,255,0.28);}
.adv{color:rgba(255,255,255,0.76);font-weight:600;}

/* Edit answers bar */
.edit-bar{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-md);padding:12px 16px;margin-top:6px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.edit-bar-text{font-size:12px;color:var(--muted);line-height:1.4;}
.edit-bar-actions{display:flex;gap:8px;flex-shrink:0;}
.btn-edit-dim{
  font-family:'Inter',sans-serif;font-size:11px;font-weight:600;
  padding:6px 14px;border-radius:var(--r-sm);border:1px solid var(--border-med);
  background:var(--surface-low);color:var(--muted);cursor:pointer;
  transition:all .12s;white-space:nowrap;
}
.btn-edit-dim:hover{background:var(--primary);border-color:var(--primary);color:#fff;}
.btn-edit-frx{
  font-family:'Inter',sans-serif;font-size:11px;font-weight:600;
  padding:6px 14px;border-radius:var(--r-sm);border:1px solid var(--border-med);
  background:var(--surface-low);color:var(--muted);cursor:pointer;
  transition:all .12s;white-space:nowrap;
}
.btn-edit-frx:hover{background:var(--primary);border-color:var(--primary);color:#fff;}

/* Insight bridge */
.insight-bridge{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);
  padding:16px 20px;margin:10px 0 14px;
  border-left:3px solid var(--rose);
  box-shadow:var(--shadow-sm);
}
.ib-tag{
  font-family:'Inter',sans-serif;font-size:9px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:var(--rose);margin-bottom:7px;
}
.ib-line{
  font-family:'Manrope',sans-serif;font-weight:700;font-size:15px;
  color:var(--text);letter-spacing:-0.01em;line-height:1.35;margin-bottom:5px;
}
.ib-sub{font-size:12.5px;color:var(--muted);line-height:1.6;}

/* Spider */
.spider-wrap{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);
  padding:26px;margin-bottom:14px;box-shadow:var(--shadow-sm);
}
.spider-head{
  display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;
}
.spider-title{
  font-family:'Manrope',sans-serif;font-weight:700;font-size:15px;
  color:var(--text);letter-spacing:-0.01em;
}
.spider-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.spider-legend{display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
.leg-dot{width:7px;height:7px;border-radius:50%;}
.spider-container{display:flex;justify-content:center;margin-bottom:20px;}
svg.spider{overflow:visible;}
.axis-bars{display:flex;flex-direction:column;gap:8px;}
.axis-row{display:flex;align-items:center;gap:12px;}
.axis-name{
  font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.05em;
  text-transform:uppercase;color:var(--muted);width:82px;flex-shrink:0;text-align:right;
}
.axis-track{flex:1;height:3px;background:var(--surface-high);border-radius:2px;overflow:hidden;}
.axis-bar{height:100%;border-radius:2px;}
.axis-pct{
  font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--faint);
  width:30px;flex-shrink:0;text-align:right;
}
.axis-interp{font-size:11px;color:var(--muted);width:120px;flex-shrink:0;}

/* r-section head */
.r-sec{
  font-family:'Inter',sans-serif;font-size:9px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:var(--muted);
  margin:22px 0 12px;display:flex;align-items:center;gap:10px;
}
.r-sec::after{content:'';flex:1;height:1px;background:var(--border);}

/* hero module */
.mod-hero{
  background:var(--surface);border:1px solid var(--border-med);border-radius:var(--r-lg);
  padding:24px 26px;margin-bottom:10px;position:relative;overflow:hidden;
  box-shadow:var(--shadow-sm);
}
.mod-hero::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--primary);
}
.mod-hero-tag{
  font-family:'Inter',sans-serif;font-size:9px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:var(--primary);margin-bottom:10px;
}
.mod-hero-headline{
  font-family:'Manrope',sans-serif;font-weight:700;font-size:15px;
  color:var(--text);line-height:1.35;margin-bottom:14px;letter-spacing:-0.01em;
}
.scenario-box{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);
  padding:14px 16px;margin-bottom:12px;
}
.scenario-label{
  font-family:'Inter',sans-serif;font-size:9px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--amber);margin-bottom:6px;
}
.scenario-text{font-size:12.5px;color:var(--muted);line-height:1.65;}
.scenario-text em{color:var(--text);font-style:normal;font-weight:600;}
.mod-solution{
  display:flex;align-items:flex-start;gap:12px;
  padding:13px 16px;background:var(--primary-soft);border-radius:var(--r-md);
  border:1px solid rgba(0,80,212,0.14);
}
.mod-name-pill{
  font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.04em;
  color:var(--primary);font-weight:600;flex-shrink:0;padding-top:2px;
}
.mod-solve-text{font-size:12.5px;color:var(--muted);line-height:1.55;}

/* secondary modules */
.mod-secondary{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);
  padding:14px 18px;margin-bottom:8px;
  display:flex;align-items:flex-start;gap:12px;
  position:relative;overflow:hidden;box-shadow:var(--shadow-sm);
}
.mod-secondary::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--amber);
}
.sec-pill{
  padding:3px 8px;border-radius:var(--r-sm);background:rgba(176,118,4,0.09);
  font-family:'Inter',sans-serif;font-size:9px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:var(--amber);flex-shrink:0;margin-top:2px;
}
.sec-body{flex:1;}
.sec-name{
  font-family:'Manrope',sans-serif;font-weight:700;font-size:13px;
  color:var(--text);margin-bottom:3px;
}
.sec-apply{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:4px;}
.sec-onboard{font-size:11.5px;color:var(--primary);line-height:1.4;}

/* pricing */
.pricing-card{
  background:var(--inv);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:var(--r-xl);padding:28px 32px;margin-top:16px;
  display:flex;align-items:center;justify-content:space-between;
  gap:20px;flex-wrap:wrap;position:relative;overflow:hidden;
  box-shadow:var(--shadow-md);
}
.pricing-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--primary-grad);
}
.pricing-card::after{
  content:'';position:absolute;top:-120px;right:-80px;width:360px;height:360px;
  background:radial-gradient(circle,rgba(123,156,255,.12) 0%,transparent 60%);
  pointer-events:none;
}
.p-label{
  font-family:'Inter',sans-serif;font-size:9px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:rgba(123,156,255,0.8);margin-bottom:5px;
}
.p-price{
  font-family:'Manrope',sans-serif;font-weight:800;font-size:32px;
  color:#fff;line-height:1;letter-spacing:-0.025em;
}
.p-price-suffix{font-size:14px;font-weight:400;color:var(--on-inv-mute);margin-left:2px;}
.p-period{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--on-inv-mute);margin-top:4px;}
.p-basis{font-size:12.5px;color:var(--on-inv-mute);line-height:1.6;max-width:240px;}
.btn-waitlist{
  font-family:'Manrope',sans-serif;font-weight:700;font-size:14px;
  padding:13px 28px;background:var(--primary-grad);color:#fff;
  border:none;border-radius:var(--r-md);cursor:pointer;transition:all .14s;
  white-space:nowrap;flex-shrink:0;position:relative;z-index:1;
  box-shadow:0 4px 16px rgba(0,80,212,0.35);
}
.btn-waitlist:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,80,212,0.45);}
.btn-restart{
  display:block;margin:16px auto 0;
  font-family:'Inter',sans-serif;font-size:11px;font-weight:500;
  letter-spacing:.06em;text-transform:uppercase;
  color:var(--faint);background:none;border:none;cursor:pointer;transition:color .12s;
}
.btn-restart:hover{color:var(--muted);}

@media(max-width:560px){
  .intro-steps{grid-template-columns:1fr 1fr;}
  .dim-opts{gap:7px;}
  .rating-row{flex-direction:column;}
  .pricing-card{flex-direction:column;align-items:flex-start;}
  .spider-legend{display:none;}
  .axis-interp{display:none;}
  .axis-name{width:66px;}
  .hdr-meta{display:none;}
  .edit-bar{flex-direction:column;align-items:flex-start;}
}
@media(max-width:400px){
  .intro-steps{grid-template-columns:1fr;}
}

const TIER_PRICE = {'Entry':'฿2,900','Mid':'฿4,900','Mid-High':'฿7,900','High':'฿11,900','Full':'฿16,900'};

// ══════════════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════════════
let ST = {phase:'p1intro',dimIdx:0,dims:{},frxIdx:0,frx:{},lang:'EN'};

// ══════════════════════════════════════════════════════════════════════════════
// GETTERS
// ══════════════════════════════════════════════════════════════════════════════
function L()       { return LANG[ST.lang]; }
function isTH()    { return ST.lang === 'TH'; }
function getDIMS() { return isTH() ? DIMS_TH : DIMS_EN; }
function getFRX()  { return isTH() ? FRICTION_CATS_TH : FRICTION_CATS_EN; }
function getARCH(code) {
  const set = isTH() ? ARCHETYPES_TH : ARCHETYPES_EN;
  return set[code] || {name:isTH()?'โปรไฟล์ธุรกิจของคุณ':'Your Business Profile',tier:'Mid',
    desc:isTH()?'การกำหนดค่าถูกคำนวณจากคำตอบของคุณ':'Your configuration has been calculated from your answers.'};
}

function setLang(lang) {
  ST.lang = lang;
  document.getElementById('btn-en').className='lang-btn'+(lang==='EN'?' active':'');
  document.getElementById('btn-th').className='lang-btn'+(lang==='TH'?' active':'');
  document.getElementById('logo-sub-text').textContent = L().logoSub;
  document.documentElement.lang = lang==='TH'?'th':'en';
  render();
}

// ══════════════════════════════════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════════════════════════════════
function getArchCode() {
  const {stage,model,growth,marketing,ops} = ST.dims;
  const g = stage==='P' ? 'B' : (growth||'B');
  const o = stage==='P' ? 'X' : (ops||'X');
  return `${stage}-${model}-${g}-${marketing}-${o}`;
}

function getAxisScore(catId) {
  const cat = getFRX().find(c=>c.id===catId); if(!cat) return 0;
  const ratings = ST.frx[catId]||{};
  let total=0; cat.items.forEach(item=>{total+=(ratings[item.id]||0);});
  return Math.max(15, Math.round((total/(cat.items.length*2))*100));
}

function getFrxSummary() {
  return getFRX().map(cat=>({
    catId:cat.id,axis:cat.axis,color:cat.color,
    score:getAxisScore(cat.id),
    rawScore:cat.items.reduce((a,item)=>a+(ST.frx[cat.id]?.[item.id]||0),0),
  })).sort((a,b)=>b.score-a.score);
}

function isFrxScreenComplete() {
  const cat=getFRX()[ST.frxIdx];
  const ratings=ST.frx[cat.id]||{};
  return cat.items.every(item=>ratings[item.id]!==undefined);
}

function totalScreens()  { return 1+getDIMS().length+1+getFRX().length; }
function currentScreen() {
  if(ST.phase==='p1intro') return 0;
  if(ST.phase==='dim')     return 1+ST.dimIdx;
  if(ST.phase==='p2intro') return 1+getDIMS().length;
  if(ST.phase==='frx')     return 1+getDIMS().length+1+ST.frxIdx;
  return totalScreens();
}

function interpText(s) {
  const t=L().interpText;
  if(s<=20)return t.minimal; if(s<=40)return t.low;
  if(s<=60)return t.moderate; if(s<=80)return t.high; return t.critical;
}

function updateProgress() {
  const ui=L().ui; const total=totalScreens(); const cur=currentScreen();
  document.getElementById('prog-fill').style.width=Math.round((cur/total)*100)+'%';
  const phaseLabels={p1intro:'',dim:ui.phase1,p2intro:ui.phase1complete,frx:ui.phase2,result:ui.complete};
  document.getElementById('prog-label').textContent=phaseLabels[ST.phase]||'';
  const showFrac=(ST.phase!=='p1intro'&&ST.phase!=='result');
  document.getElementById('prog-frac').textContent=
    showFrac?`${cur} / ${total}`:ST.phase==='result'?`${total} / ${total}`:'';
  if(ST.phase==='result') document.getElementById('prog-fill').style.width='100%';
}

// ══════════════════════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════════════════════
function render() {
  updateProgress();
  const app=document.getElementById('app');
  if(ST.phase==='p1intro')       app.innerHTML=renderIntro();
  else if(ST.phase==='dim')      app.innerHTML=renderDim();
  else if(ST.phase==='p2intro')  app.innerHTML=renderReveal();
  else if(ST.phase==='frx')      app.innerHTML=renderFrx();
  else if(ST.phase==='result')   {app.innerHTML=renderResult();initSpider();}
  window.scrollTo(0,0);
}

// ── FRICTION SCREEN ───────────────────────────────────────────────────────────
function renderFrx() {
  const ui=L().ui; const cats=getFRX(); const cat=cats[ST.frxIdx];
  const ratings=ST.frx[cat.id]||{}; const done=isFrxScreenComplete();
  const segs=cats.map((c,i)=>{
    let cls='frx-seg';
    if(i<ST.frxIdx)cls+=' done';
    else if(i===ST.frxIdx)cls+=' active';
    return `<div class="${cls}"></div>`;
  }).join('');
  const items=cat.items.map(item=>{
    const r=ratings[item.id];
    return `<div class="frx-item">
      <div class="frx-stmt">${item.stmt}</div>
      <div class="rating-row">
        <button class="r-btn r0 ${r===0?'sel':''}" onclick="setFrx('${cat.id}','${item.id}',0)">${ui.notUs}</button>
        <button class="r-btn r1 ${r===1?'sel':''}" onclick="setFrx('${cat.id}','${item.id}',1)">${ui.weFeelThis}</button>
        <button class="r-btn r2 ${r===2?'sel':''}" onclick="setFrx('${cat.id}','${item.id}',2)">${ui.realIssue}</button>

  const isLast=ST.frxIdx===cats.length-1;
  return `<div class="frx-screen">
    <div class="frx-tracker">${segs}</div>

    <div class="frx-hdr">
      <div class="frx-cat" style="background:${cat.colorBg};color:${cat.color};">${cat.axis}</div>
      <div class="frx-title">${cat.label}</div>
      <div class="frx-desc">${cat.desc}</div>
    </div>
    <div class="frx-card"><div class="frx-items">${items}</div></div>

      <button class="btn-next" onclick="next()" ${!done?'disabled':''}>${isLast?ui.seeResults:ui.next}</button>
    </div>
    ${done
      ?`<div class="frx-done-note">✓ ${cat.axis} ${ui.mapped}</div>`
      :`<div class="frx-note">${ui.rateEvery}</div>`}
  </div>`;
}

// ── SPIDER SVG ────────────────────────────────────────────────────────────────
function buildSpiderSVG(scores) {
  const N=scores.length,CX=180,CY=180,R=130;
  const angles=scores.map((_,i)=>(i/N)*2*Math.PI-Math.PI/2);
  const pt=(r,i)=>({x:CX+r*Math.cos(angles[i]),y:CY+r*Math.sin(angles[i])});
  const rings=[.25,.5,.75,1].map(r=>{
    const pts=scores.map((_,i)=>pt(R*r,i));
    return `<polygon points="${pts.map(p=>`${p.x},${p.y}`).join(' ')}" fill="none" stroke="rgba(44,47,49,0.07)" stroke-width="1"/>`;
  }).join('');
  const axes=scores.map((_,i)=>{const p=pt(R,i);
    return `<line x1="${CX}" y1="${CY}" x2="${p.x}" y2="${p.y}" stroke="rgba(44,47,49,0.07)" stroke-width="1"/>`;
  }).join('');
  const dataPts=scores.map((s,i)=>pt(R*(s.score/100),i));
  const poly=dataPts.map(p=>`${p.x},${p.y}`).join(' ');
  const dots=dataPts.map((p,i)=>{
    const hi=scores[i].score>=60;
    return `<circle cx="${p.x}" cy="${p.y}" r="${hi?5:3}" fill="${hi?scores[i].color:'rgba(44,47,49,0.18)'}" opacity="${hi?1:.7}"/>`;
  }).join('');
  const labels=scores.map((s,i)=>{
    const p=pt(R*1.22,i); const hi=s.score>=60;
    return `<text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="middle"
      font-family="JetBrains Mono,monospace" font-size="9" font-weight="${hi?'600':'400'}"
      letter-spacing=".08em" fill="${hi?s.color:'rgba(107,112,117,0.6)'}"
    >${s.axis.toUpperCase()}</text>`;
  }).join('');
  const pctLabels=dataPts.map((p,i)=>{
    if(!scores[i].rawScore) return '';
    return `<text x="${p.x}" y="${p.y-10}" text-anchor="middle"
      font-family="JetBrains Mono,monospace" font-size="8" fill="${scores[i].color}" opacity=".9"
    >${scores[i].score}%</text>`;
  }).join('');
  return `<svg class="spider" width="360" height="360" viewBox="0 0 360 360">
    <defs><radialGradient id="sg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,80,212,0.12)"/>
      <stop offset="100%" stop-color="rgba(0,80,212,0.02)"/>
    </radialGradient></defs>
    ${rings}${axes}
    <polygon points="${poly}" fill="url(#sg)" stroke="rgba(0,80,212,0.45)" stroke-width="1.5" stroke-linejoin="round"/>
    ${dots}${pctLabels}${labels}
  </svg>`;
}

// ── RESULT ────────────────────────────────────────────────────────────────────
function renderResult() {
  const ui=L().ui;
  const code=getArchCode(); const arch=getARCH(code);
  const dimLabels=L().dimLabels;
  const summary=getFrxSummary();
  const price=TIER_PRICE[arch.tier]||'฿4,900';
  const cats=getFRX();

  // Clickable dim pills — each jumps back to that dimension question
  const dimEntries=Object.entries(ST.dims);
  const dimPills=dimEntries.map(([k,v],idx)=>`
    <div class="arch-dim" onclick="goBackToDim('${k}')" title="${ui.editAnswers}">
      <span class="adl">${k}</span>
      <span class="adv">${dimLabels[k]?.[v]||v}</span>
      <span class="arch-dim-edit">✎</span>
    </div>`).join('');

  const spiderData=cats.map(cat=>({
    axis:cat.axis,score:getAxisScore(cat.id),color:cat.color,
    rawScore:cat.items.reduce((a,i)=>a+(ST.frx[cat.id]?.[i.id]||0),0)
  }));

  function barColor(s){return s<=30?'#4338ca':s<=55?'#b07604':'#c62b3b';}

  const axisBars=[...spiderData].sort((a,b)=>b.score-a.score).map(s=>
    `<div class="axis-row">
      <div class="axis-name">${s.axis}</div>
      <div class="axis-track"><div class="axis-bar" style="width:${s.score}%;background:${barColor(s.score)};"></div></div>
      <div class="axis-pct">${s.score}%</div>
      <div class="axis-interp">${interpText(s.score)}</div>
    </div>`
  ).join('');

  const top=summary[0];
  const pres=PRESCRIPTIONS_EN[top.catId];
  const scen=pres?.getScenario(arch,isTH());
  const cost=L().costByAxis[top.catId]||(isTH()?'ปัญหาที่สะสมเงียบๆ ตลอดเวลา':'friction that compounds quietly over time');

  const secondary=summary.slice(1).filter(s=>s.rawScore>0).map(s=>{
    const p=PRESCRIPTIONS_EN[s.catId]; if(!p) return '';
    const cat=cats.find(c=>c.id===s.catId);
    const alsoInc=p.secondaryModules?.length?`${ui.alsoIncludes} ${p.secondaryModules.slice(0,2).join(', ')}.`:'';
    return `<div class="mod-secondary">
      <div class="sec-pill">${ui.included}</div>
      <div class="sec-body">
        <div class="sec-name">${p.module}</div>
        <div class="sec-apply">${ui.frictionIn} <em style="color:${cat?.color||'var(--primary)'};font-style:normal;">${s.axis}</em> — ${alsoInc}</div>
        <div class="sec-onboard">${ui.configuredFor}</div>
      </div>
    </div>`;
  }).join('');

  const flagged=summary.filter(s=>s.rawScore>0).length;

  return `<div class="result">
    <div class="arch-card">
      <div class="arch-kicker">${ui.diagnosticResult} ${code}</div>
      <div class="arch-name">${arch.name}</div>
      <div class="arch-code">${code} · ${arch.tier} ${ui.configuration}</div>
      <div class="arch-desc">${arch.desc}</div>
      <div class="arch-dims">${dimPills}</div>
    </div>

    <div class="edit-bar">
      <div class="edit-bar-text">${ui.editNote}</div>
      <div class="edit-bar-actions">
        <button class="btn-edit-dim" onclick="goBackToDim('stage')">${ui.editProfileBtn}</button>
        <button class="btn-edit-frx" onclick="goBackToFrx(0)">${ui.editFrictionBtn}</button>
      </div>
    </div>

    <div class="insight-bridge">
      <div class="ib-tag">${ui.primarySignal}</div>
      <div class="ib-line">${top.axis} friction at ${top.score}% ${ui.highestCostGap}</div>
      <div class="ib-sub">${ui.forArchetype} ${arch.name}, ${ui.thatMeans} ${cost}.</div>
    </div>

    <div class="spider-wrap">
      <div class="spider-head">
        <div>
          <div class="spider-title">${ui.frictionProfile}</div>
          <div class="spider-sub">${ui.allSevenAxes}</div>
        </div>
        <div class="spider-legend">
          <div class="leg-item"><div class="leg-dot" style="background:var(--rose)"></div>${ui.high}</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--amber)"></div>${ui.moderate}</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--indigo)"></div>${ui.low}</div>
        </div>
      </div>
      <div class="spider-container" id="spider-container"></div>
      <div class="axis-bars">${axisBars}</div>
    </div>

    ${pres&&scen?`
    <div class="r-sec">${ui.priorityModule} ${top.axis}</div>
    <div class="mod-hero">
      <div class="mod-hero-tag">◈ ${top.axis} · ${top.score}% friction</div>
      <div class="mod-hero-headline">${scen.headline}</div>
      <div class="scenario-box">
        <div class="scenario-label">${ui.theSituation}</div>
        <div class="scenario-text">${scen.situation}</div>
      </div>
      <div class="mod-solution">
        <div class="mod-name-pill">${pres.module}</div>
        <div class="mod-solve-text">${scen.resolution}</div>
      </div>
    </div>`:''}

    ${secondary?`<div class="r-sec">${ui.additionalModules}</div>${secondary}`:''}

    <div class="pricing-card">
      <div>
        <div class="p-label">${ui.yourSLCPlan}</div>
        <div class="p-price">${price}<span class="p-price-suffix">${ui.perMonth}</span></div>
        <div class="p-period">${arch.tier} · ${flagged} ${ui.frictionAreasFlagged}</div>
      </div>
      <div class="p-basis">${ui.configBuilt}</div>
      <button class="btn-waitlist" onclick="alert('${isTH()?'กำลังเปิดรายชื่อรอเร็วๆ นี้':'Waitlist coming soon.'}')">${ui.joinWaitlist}</button>
    </div>
    <button class="btn-restart" onclick="restart()">${ui.retake}</button>
  </div>`;
}

function initSpider() {
  const data=getFRX().map(cat=>({
    axis:cat.axis,score:getAxisScore(cat.id),color:cat.color,
    rawScore:cat.items.reduce((a,i)=>a+(ST.frx[cat.id]?.[i.id]||0),0)
  }));
  const c=document.getElementById('spider-container');
  if(c) c.innerHTML=buildSpiderSVG(data);
}

// ══════════════════════════════════════════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════════════════════════════════════════
function setDim(id,val){ ST.dims[id]=val; render(); }
function setFrx(catId,itemId,val){
  if(!ST.frx[catId]) ST.frx[catId]={};
  ST.frx[catId][itemId]=val; render();
}

// Back-navigation: jump to a specific dimension by id
function goBackToDim(dimId) {
  const dims=getDIMS();
  const idx=dims.findIndex(d=>d.id===dimId);
  if(idx===-1) return;
  ST.phase='dim'; ST.dimIdx=idx; render();
}

// Back-navigation: jump to a specific friction category by index
function goBackToFrx(idx) {
  ST.phase='frx'; ST.frxIdx=idx||0; render();
}

function next() {
  const dims=getDIMS(); const cats=getFRX();
  if(ST.phase==='p1intro'){ ST.phase='dim'; ST.dimIdx=0; }
  else if(ST.phase==='dim'){
    if(ST.dimIdx<dims.length-1) ST.dimIdx++;
    else ST.phase='p2intro';
  }
  else if(ST.phase==='p2intro'){ ST.phase='frx'; ST.frxIdx=0; }
  else if(ST.phase==='frx'){
    if(ST.frxIdx<cats.length-1) ST.frxIdx++;
    else ST.phase='result';
  }
  render();
}

function back() {
  const dims=getDIMS();
  if(ST.phase==='dim'){
    if(ST.dimIdx>0) ST.dimIdx--;
    else ST.phase='p1intro';
  }
  else if(ST.phase==='p2intro'){ ST.phase='dim'; ST.dimIdx=dims.length-1; }
  else if(ST.phase==='frx'){
    if(ST.frxIdx>0) ST.frxIdx--;
    else ST.phase='p2intro';
  }
  render();
}

function restart() {
  ST={phase:'p1intro',dimIdx:0,dims:{},frxIdx:0,frx:{},lang:ST.lang};
  window.scrollTo(0,0); render();
}

render();
</script>
</body>
