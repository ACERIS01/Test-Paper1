<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLC — Business Diagnostic</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0b0e14;
  --bg2:    #111520;
  --bg3:    #161c2a;
  --bg4:    #1c2438;
  --b:      rgba(255,255,255,0.07);
  --b2:     rgba(255,255,255,0.12);
  --text:   #e2e8f0;
  --muted:  rgba(226,232,240,0.50);
  --dim:    rgba(226,232,240,0.22);
  --teal:   #1dd9a0;
  --teal2:  rgba(29,217,160,0.10);
  --teal3:  rgba(29,217,160,0.05);
  --amber:  #f59e0b;
  --amber2: rgba(245,158,11,0.10);
  --rose:   #f43f5e;
  --rose2:  rgba(244,63,94,0.10);
  --violet: #8b5cf6;
  --violet2:rgba(139,92,246,0.10);
  --sky:    #38bdf8;
  --sky2:   rgba(56,189,248,0.08);
  --green:  #22c55e;
  --lime:   #84cc16;
  --cyan:   #06b6d4;
  --pink:   #ec4899;
  --indigo: #6366f1;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg); color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:14px; line-height:1.5;
  min-height:100vh; overflow-x:hidden;
}

/* ── SHELL ── */
.shell{
  max-width:720px; margin:0 auto;
  padding:36px 20px 100px;
}

/* ── HEADER ── */
.hdr{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:40px; padding-bottom:20px; border-bottom:1px solid var(--b);
}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{
  width:32px;height:32px;border-radius:8px;background:var(--teal);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#0b0e14;
}
.logo-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;}
.logo-sub{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;margin-top:1px;}
.hdr-right{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;}

/* ── PROGRESS ── */
.prog{margin-bottom:32px;}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.prog-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.prog-frac{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);}
.prog-track{height:2px;background:var(--b);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);}

/* ── PHASE INTRO ── */
.phase-intro{
  text-align:center;padding:48px 24px;animation:up .3s ease;
}
.phase-ico{
  width:52px;height:52px;border-radius:14px;margin:0 auto 16px;
  display:flex;align-items:center;justify-content:center;font-size:22px;
}
.phase-ico.p1{background:var(--teal2);border:1px solid rgba(29,217,160,.2);}
.phase-ico.p2{background:var(--amber2);border:1px solid rgba(245,158,11,.2);}
.phase-kicker{font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.phase-title{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#fff;margin-bottom:8px;line-height:1.2;}
.phase-desc{font-size:13px;color:var(--muted);max-width:460px;margin:0 auto 24px;line-height:1.65;}
.phase-badge{
  display:inline-block;padding:6px 14px;border-radius:20px;
  background:var(--teal2);border:1px solid rgba(29,217,160,.2);
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--teal);
}

/* ── DIMENSION QUESTION ── */
.dim-screen{animation:up .25s ease;}
@keyframes up{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.dim-label{
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--dim);margin-bottom:10px;
}
.dim-q{
  background:var(--bg2);border:1px solid var(--b);border-radius:13px;
  padding:28px;margin-bottom:10px;
}
.dim-prompt{
  font-family:'Syne',sans-serif;font-weight:700;font-size:18px;
  color:#fff;line-height:1.35;margin-bottom:6px;
}
.dim-sub{font-size:12.5px;color:var(--muted);margin-bottom:22px;line-height:1.6;}

.dim-opts{display:flex;flex-direction:column;gap:8px;}
.dim-opt{
  display:flex;align-items:flex-start;gap:14px;
  padding:14px 16px;border:1px solid var(--b);border-radius:10px;
  background:var(--bg3);cursor:pointer;transition:all .15s;
  position:relative;overflow:hidden;
}
.dim-opt::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:transparent;transition:background .15s;
}
.dim-opt:hover{border-color:var(--b2);background:var(--bg4);}
.dim-opt.sel{border-color:rgba(29,217,160,.35);background:var(--teal3);}
.dim-opt.sel::before{background:var(--teal);}

.opt-key{
  width:26px;height:26px;border-radius:7px;border:1px solid var(--b2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);
  transition:all .15s;
}
.dim-opt.sel .opt-key{background:var(--teal);border-color:var(--teal);color:#0b0e14;font-weight:500;}
.opt-body{flex:1;}
.opt-title{font-weight:600;font-size:13.5px;color:var(--text);margin-bottom:2px;line-height:1.4;}
.opt-desc{font-size:11.5px;color:var(--muted);line-height:1.5;}

/* ── FRICTION SCREEN ── */
.frx-screen{animation:up .25s ease;}
.frx-hdr{margin-bottom:14px;}
.frx-cat{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;
  text-transform:uppercase;padding:3px 9px;border-radius:4px;margin-bottom:10px;
}
.frx-title{font-family:'Syne',sans-serif;font-weight:700;font-size:19px;color:#fff;margin-bottom:4px;}
.frx-desc{font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:20px;}

.frx-card{
  background:var(--bg2);border:1px solid var(--b);border-radius:13px;
  padding:22px 24px;margin-bottom:10px;
}
.frx-items{display:flex;flex-direction:column;gap:0;}

.frx-item{
  padding:14px 0;border-bottom:1px solid var(--b);
}
.frx-item:last-child{border-bottom:none;padding-bottom:0;}
.frx-item:first-child{padding-top:0;}

.frx-stmt{
  font-size:13.5px;color:var(--text);line-height:1.5;
  margin-bottom:10px;font-weight:500;
}

.rating-row{display:flex;gap:6px;}
.r-btn{
  flex:1;padding:8px 6px;border:1px solid var(--b);border-radius:8px;
  background:var(--bg3);cursor:pointer;transition:all .15s;text-align:center;
  font-family:'DM Sans',sans-serif;font-weight:500;font-size:11.5px;
  color:var(--muted);line-height:1.3;
}
.r-btn:hover{border-color:var(--b2);color:var(--text);}
.r-btn.r0.sel{background:var(--bg4);border-color:var(--b2);color:var(--dim);}
.r-btn.r1.sel{background:var(--amber2);border-color:rgba(245,158,11,.35);color:var(--amber);}
.r-btn.r2.sel{background:var(--rose2);border-color:rgba(244,63,94,.35);color:var(--rose);}

/* ── NAV ── */
.nav{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:20px;padding-top:20px;border-top:1px solid var(--b);
}
.btn-back{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--dim);background:none;border:none;
  cursor:pointer;padding:8px 0;transition:color .15s;
}
.btn-back:hover{color:var(--muted);}
.btn-back:disabled{opacity:.2;cursor:default;}
.btn-next{
  font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;
  padding:10px 24px;background:var(--teal);color:#0b0e14;
  border:none;border-radius:8px;cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:5px;
}
.btn-next:hover{background:#22f5b4;}
.btn-next:disabled{background:var(--bg4);color:var(--dim);cursor:default;}
.frx-note{
  text-align:center;margin-top:10px;
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.06em;
  color:var(--dim);
}

/* ── RESULT ── */
.result{animation:up .4s ease;}

/* archetype hero */
.arch-card{
  background:var(--bg2);border:1px solid var(--b);border-radius:14px;
  padding:30px;margin-bottom:12px;position:relative;overflow:hidden;
}
.arch-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--teal),var(--cyan),var(--violet));
}
.arch-kicker{
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--teal);margin-bottom:10px;
}
.arch-name{
  font-family:'Syne',sans-serif;font-weight:800;font-size:24px;
  color:#fff;line-height:1.15;margin-bottom:4px;
}
.arch-code{
  font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);
  letter-spacing:.06em;margin-bottom:14px;
}
.arch-desc{font-size:13px;color:var(--muted);line-height:1.7;max-width:540px;}
.arch-dims{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-top:18px;padding-top:18px;border-top:1px solid var(--b);
}
.arch-dim{
  display:flex;align-items:center;gap:5px;padding:3px 9px;
  border-radius:5px;background:var(--bg4);border:1px solid var(--b);
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.05em;
}
.adl{color:var(--dim);}.adv{color:var(--text);font-weight:500;}

/* spider web */
.spider-wrap{
  background:var(--bg2);border:1px solid var(--b);border-radius:14px;
  padding:28px;margin-bottom:12px;
}
.spider-head{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:20px;
}
.spider-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:#fff;}
.spider-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.spider-legend{display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
.leg-dot{width:8px;height:8px;border-radius:50%;}

.spider-container{display:flex;justify-content:center;margin-bottom:20px;}
svg.spider{overflow:visible;}

.axis-bars{display:flex;flex-direction:column;gap:8px;}
.axis-row{display:flex;align-items:center;gap:10px;}
.axis-name{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;
  text-transform:uppercase;color:var(--muted);width:90px;flex-shrink:0;text-align:right;
}
.axis-track{flex:1;height:4px;background:var(--b);border-radius:2px;overflow:hidden;}
.axis-bar{height:100%;border-radius:2px;transition:width 1s cubic-bezier(.4,0,.2,1);}
.axis-pct{
  font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);
  width:34px;flex-shrink:0;text-align:right;
}
.axis-interp{font-size:11px;color:var(--muted);width:130px;flex-shrink:0;}

/* r-section head */
.r-sec{
  font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--muted);
  margin:22px 0 10px;display:flex;align-items:center;gap:8px;
}
.r-sec::after{content:'';flex:1;height:1px;background:var(--b);}

/* hero module card */
.mod-hero{
  background:var(--bg2);border:1px solid var(--b2);border-radius:13px;
  padding:26px;margin-bottom:10px;position:relative;overflow:hidden;
}
.mod-hero::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:var(--teal);
}
.mod-hero-tag{
  font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--teal);margin-bottom:8px;
}
.mod-hero-headline{
  font-family:'Syne',sans-serif;font-weight:700;font-size:15px;
  color:#fff;line-height:1.35;margin-bottom:12px;
}
.scenario-box{
  background:var(--bg3);border:1px solid var(--b);border-radius:9px;
  padding:14px 16px;margin-bottom:12px;
}
.scenario-label{
  font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--amber);margin-bottom:6px;
}
.scenario-text{font-size:12.5px;color:var(--muted);line-height:1.65;}
.scenario-text em{color:var(--text);font-style:normal;font-weight:600;}
.mod-solution{
  display:flex;align-items:flex-start;gap:10px;
  padding:12px 14px;background:var(--teal2);border-radius:8px;
  border:1px solid rgba(29,217,160,.18);
}
.mod-name-pill{
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.04em;
  color:var(--teal);font-weight:500;flex-shrink:0;padding-top:1px;
}
.mod-solve-text{font-size:12.5px;color:var(--muted);line-height:1.55;}

/* secondary module cards */
.mod-secondary{
  background:var(--bg2);border:1px solid var(--b);border-radius:11px;
  padding:16px 18px;margin-bottom:8px;
  display:flex;align-items:flex-start;gap:12px;
  position:relative;overflow:hidden;
}
.mod-secondary::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--amber);
}
.sec-pill{
  padding:2px 8px;border-radius:4px;background:var(--amber2);
  font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--amber);flex-shrink:0;margin-top:2px;
}
.sec-body{flex:1;}
.sec-name{font-weight:600;font-size:13px;color:var(--text);margin-bottom:3px;}
.sec-apply{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:5px;}
.sec-onboard{
  font-size:11px;color:var(--teal);font-style:italic;
  line-height:1.4;
}

/* pricing + CTA */
.pricing-card{
  background:var(--bg2);border:1px solid rgba(29,217,160,.2);
  border-radius:14px;padding:24px 26px;margin-top:12px;
  display:flex;align-items:center;justify-content:space-between;
  gap:20px;flex-wrap:wrap;
}
.p-left{}
.p-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);margin-bottom:4px;}
.p-price{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:#fff;line-height:1;}
.p-period{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--muted);margin-top:3px;}
.p-basis{font-size:12px;color:var(--muted);line-height:1.6;max-width:260px;}
.btn-waitlist{
  font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;
  padding:13px 28px;background:var(--teal);color:#0b0e14;
  border:none;border-radius:9px;cursor:pointer;transition:all .15s;
  white-space:nowrap;flex-shrink:0;
}
.btn-waitlist:hover{background:#22f5b4;transform:translateY(-1px);}

.btn-restart{
  display:block;margin:16px auto 0;font-family:'DM Mono',monospace;
  font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--dim);background:none;border:none;cursor:pointer;transition:color .15s;
}
.btn-restart:hover{color:var(--muted);}

@media(max-width:560px){
  .dim-opts{gap:6px;}
  .rating-row{flex-direction:column;}
  .pricing-card{flex-direction:column;align-items:flex-start;}
  .spider-legend{display:none;}
  .axis-interp{display:none;}
  .axis-name{width:70px;}
}
</style>
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <div class="hdr">
    <div class="logo">
      <div class="logo-mark">S</div>
      <div>
        <div class="logo-name">SLC ACERIS</div>
        <div class="logo-sub">Business Diagnostic</div>
      </div>
    </div>
    <div class="hdr-right">v1 · Confidential</div>
  </div>

  <!-- PROGRESS -->
  <div class="prog">
    <div class="prog-top">
      <div class="prog-label" id="prog-label">Getting started</div>
      <div class="prog-frac" id="prog-frac"></div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <!-- CONTENT -->
  <div id="app"></div>

</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// PHASE 1 — DIMENSION QUESTIONS
// ══════════════════════════════════════════════════════════════════════════════
const DIMS = [
  {
    id:'stage', label:'Dimension 1 · Business Stage',
    prompt:'Looking at your calendar for the coming week — which best describes your primary focus right now?',
    sub:'Pick the one that reflects reality, not where you want to be.',
    opts:[
      { key:'P', letter:'A',
        title:'Refining our concept, securing suppliers, and preparing for our official launch',
        desc:'The business has not made its first sale. You are in planning, validation, or pre-market setup.' },
      { key:'L', letter:'B',
        title:'Fulfilling active orders, managing daily cash flow, and putting out operational fires',
        desc:'The business is live, generating revenue, and running day-to-day.' },
    ]
  },
  {
    id:'model', label:'Dimension 2 · Business Model',
    prompt:'If your business volume doubled overnight — where would the immediate, critical pressure fall?',
    sub:'Think about what would actually break first.',
    opts:[
      { key:'D', letter:'A',
        title:'Sourcing raw materials, managing inventory, packaging, and shipping physical goods',
        desc:'You sell or produce tangible products — e-commerce, retail, food, skincare, manufacturing.' },
      { key:'S', letter:'B',
        title:'Finding enough hours, scheduling qualified people, and maintaining quality of expertise',
        desc:'You deliver expertise, time, or intangible value — consulting, services, education, creative work.' },
    ]
  },
  {
    id:'growth', label:'Dimension 3 · Growth Mode',
    prompt:'When you evaluate your monthly results — what is your most critical definition of success right now?',
    sub:null,
    opts:[
      { key:'B', letter:'A',
        title:'Stable processes, satisfied customers, consistently hitting break-even targets',
        desc:'Building a solid foundation. Stability matters more than speed right now.' },
      { key:'G', letter:'B',
        title:'Capturing market share, outpacing competitors, aggressive growth metrics month-on-month',
        desc:'The model is proven. You are injecting capital and effort to scale as fast as possible.' },
    ]
  },
  {
    id:'marketing', label:'Dimension 4 · Marketing Maturity',
    prompt:'How do new, high-value customers predominantly discover your business?',
    sub:null,
    opts:[
      { key:'O', letter:'A',
        title:'Word of mouth, organic social posts, direct networking, and referrals',
        desc:'You rely on unpaid channels. No structured paid campaigns running regularly.' },
      { key:'F', letter:'B',
        title:'Tracked paid ad campaigns, KOL partnerships, and performance-based promotions',
        desc:'You actively spend on paid acquisition and measure return on every campaign.' },
    ]
  },
  {
    id:'ops', label:'Dimension 5 · Operations Complexity',
    prompt:'When executing a major order or project — who does the heavy lifting?',
    sub:null,
    opts:[
      { key:'X', letter:'A',
        title:'Myself and a tight founding unit — no external contractors or complex supplier networks',
        desc:'You operate lean. Execution is internal.' },
      { key:'E', letter:'B',
        title:'A network of freelancers, part-time staff, contractors, or external suppliers',
        desc:'Execution depends on people and organisations outside your core team.' },
    ]
  },
];

// ══════════════════════════════════════════════════════════════════════════════
// PHASE 2 — FRICTION SCREENS (7 categories, everyone gets all)
// Rating: 0 = Not us, 1 = We feel this, 2 = This is a real issue
// ══════════════════════════════════════════════════════════════════════════════
const FRICTION_CATS = [
  {
    id:'planning', axis:'Planning',
    label:'Planning & New Ventures',
    color:'#22c55e', colorBg:'rgba(34,197,94,0.08)',
    desc:'Whether you are starting fresh or adding a new product line or channel — these are the questions about direction, numbers, and foundations.',
    items:[
      { id:'P01', stmt:'You are planning something new — a business, product line, or channel — but the financial numbers have not been properly validated.' },
      { id:'P03', stmt:'Your pricing feels more like an estimate than a decision. You are not confident it covers your costs, beats competitors, or matches what customers will pay.' },
      { id:'P05', stmt:'Your value proposition is still vague — you struggle to explain exactly who your best customer is and why they choose you over anyone else.' },
      { id:'P06', stmt:'You lack a structured marketing plan — no clarity on which platforms to use, what to create, or in what order to launch.' },
      { id:'P07', stmt:'You need to pitch to investors or a bank but have no professional deck or structured financial model to present.' },
    ]
  },
  {
    id:'finance', axis:'Finance',
    label:'Cash & Financial Visibility',
    color:'#1dd9a0', colorBg:'rgba(29,217,160,0.08)',
    desc:'How clearly you can see your financial reality — past, present, and forward.',

// STATE
// ══════════════════════════════════════════════════════════════════════════════
let ST = {
  phase: 'p1intro',   // p1intro | dim | p2intro | frx | result
  dimIdx: 0,
  dims: {},           // stage,model,growth,marketing,ops
  frxIdx: 0,
  frx: {},            // { [catId]: { [itemId]: 0|1|2 } }
};

// ══════════════════════════════════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════════════════════════════════
function getArchCode() {
  const { stage, model, growth, marketing, ops } = ST.dims;
  const g = stage === 'P' ? 'B' : (growth || 'B');
  const o = stage === 'P' ? 'X' : (ops || 'X');
  return `${stage}-${model}-${g}-${marketing}-${o}`;
}

function getAxisScore(catId) {
  const cat = FRICTION_CATS.find(c => c.id === catId);
  if (!cat) return 0;
  const ratings = ST.frx[catId] || {};
  let total = 0, max = cat.items.length * 2;
  cat.items.forEach(item => { total += (ratings[item.id] || 0); });
  // Floor at 15% for visual presence
  return Math.max(15, Math.round((total / max) * 100));
}

function getFrxSummary() {
  // Returns array of {catId, axis, score, color} sorted desc
  return FRICTION_CATS.map(cat => ({
    catId: cat.id,
    axis: cat.axis,
    score: getAxisScore(cat.id),
    rawScore: FRICTION_CATS.find(c=>c.id===cat.id).items.reduce((a,item) => a + (ST.frx[cat.id]?.[item.id] || 0), 0),
    color: cat.color,
    label: cat.label,
  })).sort((a,b) => b.score - a.score);
}

function isFrxScreenComplete() {
  const cat = FRICTION_CATS[ST.frxIdx];
  const ratings = ST.frx[cat.id] || {};
  return cat.items.every(item => ratings[item.id] !== undefined);
}

function totalScreens() { return 1 + DIMS.length + 1 + FRICTION_CATS.length; }
function currentScreen() {
  if (ST.phase === 'p1intro') return 0;
  if (ST.phase === 'dim') return 1 + ST.dimIdx;
  if (ST.phase === 'p2intro') return 1 + DIMS.length;
  if (ST.phase === 'frx') return 1 + DIMS.length + 1 + ST.frxIdx;
  return totalScreens();
}

function updateProgress() {
  const total = totalScreens();
  const cur = currentScreen();
  const pct = Math.round((cur / total) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';

  const labels = { p1intro:'Phase 1 — Business Profile', dim:'Phase 1 — Business Profile', p2intro:'Phase 2 — Friction Analysis', frx:'Phase 2 — Friction Analysis', result:'Complete' };
  document.getElementById('prog-label').textContent = labels[ST.phase] || '';
  if (ST.phase !== 'p1intro' && ST.phase !== 'result') {
    document.getElementById('prog-frac').textContent = `${cur} / ${total}`;
  } else if (ST.phase === 'result') {
    document.getElementById('prog-frac').textContent = `${total} / ${total}`;
    document.getElementById('prog-fill').style.width = '100%';
  } else {
    document.getElementById('prog-frac').textContent = '';
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════════════════════
function render() {
  updateProgress();
  const app = document.getElementById('app');
  if (ST.phase === 'p1intro') app.innerHTML = renderP1Intro();
  else if (ST.phase === 'dim')    app.innerHTML = renderDim();
  else if (ST.phase === 'p2intro') app.innerHTML = renderP2Intro();
  else if (ST.phase === 'frx')    app.innerHTML = renderFrx();
  else if (ST.phase === 'result') { app.innerHTML = renderResult(); initSpider(); }
}

  return `<div class="frx-screen">

  const N = scores.length;
  const CX = 180, CY = 180, R = 140;
  const rings = [0.25, 0.5, 0.75, 1.0];
  const angles = scores.map((_, i) => (i / N) * 2 * Math.PI - Math.PI / 2);

  function pt(r, i) {
    return { x: CX + r * Math.cos(angles[i]), y: CY + r * Math.sin(angles[i]) };
  }

  // Ring grid
  let ringsHTML = rings.map(r => {
    const pts = scores.map((_, i) => pt(R * r, i));
    return `<polygon points="${pts.map(p=>`${p.x},${p.y}`).join(' ')}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;
  }).join('');

  // Axis lines
  let axesHTML = scores.map((_, i) => {
    const p = pt(R, i);
    return `<line x1="${CX}" y1="${CY}" x2="${p.x}" y2="${p.y}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
  }).join('');

  // Data polygon
  const dataPts = scores.map((s, i) => pt(R * (s.score / 100), i));
  const polyPts = dataPts.map(p => `${p.x},${p.y}`).join(' ');

  // Data dots
  let dotsHTML = dataPts.map((p, i) => {
    const isHigh = scores[i].score >= 60;
    const color = isHigh ? scores[i].color : 'rgba(255,255,255,0.3)';
    return `<circle cx="${p.x}" cy="${p.y}" r="${isHigh ? 5 : 3}" fill="${color}" opacity="${isHigh ? 1 : 0.6}"/>`;
  }).join('');

  // Labels
  let labelsHTML = scores.map((s, i) => {
    const p = pt(R * 1.22, i);
    const isHigh = s.score >= 60;
    const color = isHigh ? s.color : 'rgba(226,232,240,0.35)';
    const fw = isHigh ? '600' : '400';
    return `<text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="middle"
      font-family="DM Mono,monospace" font-size="9.5" font-weight="${fw}"
      letter-spacing="0.08em" fill="${color}"
      transform="rotate(${(angles[i] * 180 / Math.PI) > 90 && (angles[i] * 180 / Math.PI) < 270 ? 180 : 0},${p.x},${p.y})"
    >${s.axis.toUpperCase()}</text>`;
  }).join('');

  // Score labels on dots (high friction only)
  let scoreLabels = dataPts.map((p, i) => {
    if (scores[i].rawScore === 0) return '';
    return `<text x="${p.x}" y="${p.y - 10}" text-anchor="middle"
      font-family="DM Mono,monospace" font-size="8" fill="${scores[i].color}" opacity="0.8"
    >${scores[i].score}%</text>`;
  }).join('');

  return `<svg class="spider" width="360" height="360" viewBox="0 0 360 360">
    <defs>
      <radialGradient id="spiderGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="rgba(29,217,160,0.15)"/>
        <stop offset="100%" stop-color="rgba(29,217,160,0.02)"/>
      </radialGradient>
    </defs>
    ${ringsHTML}
    ${axesHTML}
    <polygon points="${polyPts}" fill="url(#spiderGrad)" stroke="rgba(29,217,160,0.6)" stroke-width="1.5" stroke-linejoin="round"/>
    ${dotsHTML}
    ${scoreLabels}
    ${labelsHTML}
  </svg>`;
}

// ── Result ──
function renderResult() {
  const code = getArchCode();
  const arch = ARCHETYPES[code] || { name:'Your Business Profile', tier:'Mid', desc:'Your configuration has been calculated from your answers.' };
  const summary = getFrxSummary();
  const price = TIER_PRICE[arch.tier] || '฿4,900';

  // Archetype dims
  const dimPills = Object.entries(ST.dims).map(([k,v]) =>
    `<div class="arch-dim"><span class="adl">${k}</span><span class="adv">${DIM_LABELS[k]?.[v]||v}</span></div>`
  ).join('');

  // Spider SVG placeholder (axes in order)
  const spiderData = FRICTION_CATS.map(cat => ({
    axis: cat.axis, score: getAxisScore(cat.id),
    rawScore: cat.items.reduce((a,item) => a + (ST.frx[cat.id]?.[item.id]||0), 0),
    color: cat.color
  }));

  // Axis bars interpretation
  const interps = ['Minimal','Low','Moderate','Significant','High','Critical'];
  function interpText(score) {
    if (score <= 20) return 'Minimal friction';
    if (score <= 35) return 'Low friction';
    if (score <= 50) return 'Some friction';
    if (score <= 65) return 'Noticeable friction';
    if (score <= 80) return 'High friction';
    return 'Critical friction';
  }
  function barColor(score) {
    if (score <= 25) return '#6366f1';
    if (score <= 50) return '#f59e0b';
    return '#f43f5e';
  }

  const axisBars = [...spiderData].sort((a,b) => b.score-a.score).map(s =>
    `<div class="axis-row">
      <div class="axis-name">${s.axis}</div>
      <div class="axis-track">
        <div class="axis-bar" style="width:${s.score}%;background:${barColor(s.score)};" id="bar-${s.axis}"></div>
      </div>
      <div class="axis-pct">${s.score}%</div>
      <div class="axis-interp">${interpText(s.score)}</div>
    </div>`
  ).join('');

  // Hero module — highest raw friction axis
  const topAxis = summary[0];
  const heroPrescription = PRESCRIPTIONS[topAxis.catId];
  const heroScenario = heroPrescription?.getScenario(arch);

  // Secondary modules — next flagged axes (rawScore > 0)
  const secondaryAxes = summary.slice(1).filter(s => s.rawScore > 0);
  const secondaryCards = secondaryAxes.map(s => {
    const p = PRESCRIPTIONS[s.catId];
    if (!p) return '';
    const cat = FRICTION_CATS.find(c => c.id === s.catId);
    return `
    <div class="mod-secondary">
      <div class="sec-pill">Included</div>
      <div class="sec-body">
        <div class="sec-name">${p.module}</div>
        <div class="sec-apply">Your friction in <em style="color:${cat?.color||'var(--teal)'}">${s.axis}</em> signals this module is relevant to your business. ${p.secondaryModules?.length ? `Also includes: ${p.secondaryModules.slice(0,2).join(', ')}.` : ''}</div>
        <div class="sec-onboard">Every plan includes ongoing configuration support — we adapt each module to how your business actually runs.</div>
      </div>
    </div>`;
  }).join('');

  // Module count for pricing
  const flaggedCount = summary.filter(s => s.rawScore > 0).length;
  let priceNote = `${flaggedCount} of 7 friction areas flagged — your configuration reflects exactly what your business needs right now.`;

  return `<div class="result">

    <div class="arch-card">
      <div class="arch-kicker">Your SLC Archetype · Diagnostic Result</div>
      <div class="arch-name">${arch.name}</div>
      <div class="arch-code">${code} · ${arch.tier} Configuration</div>
      <div class="arch-desc">${arch.desc}</div>
      <div class="arch-dims">${dimPills}</div>
    </div>

    <div class="spider-wrap">
      <div class="spider-head">
        <div>
          <div class="spider-title">Your Friction Profile</div>
          <div class="spider-sub">Seven dimensions of business friction — scored from your answers</div>
        </div>
        <div class="spider-legend">
          <div class="leg-item"><div class="leg-dot" style="background:var(--rose)"></div><span>High friction</span></div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--amber)"></div><span>Moderate</span></div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--indigo)"></div><span>Low friction</span></div>
        </div>
      </div>
      <div class="spider-container" id="spider-container">
        <!-- SVG injected by JS -->
      </div>
      <div class="axis-bars">${axisBars}</div>
    </div>

    ${heroPrescription && heroScenario ? `
    <div class="r-sec">Your highest friction area — module prescription</div>
    <div class="mod-hero">
      <div class="mod-hero-tag">◈ Priority Module · ${topAxis.axis} · ${topAxis.score}% friction</div>
      <div class="mod-hero-headline">${heroScenario.headline}</div>
      <div class="scenario-box">
        <div class="scenario-label">Your situation</div>
        <div class="scenario-text">${heroScenario.situation}</div>
      </div>
      <div class="mod-solution">
        <div class="mod-name-pill">${heroPrescription.module}</div>
        <div class="mod-solve-text">${heroScenario.resolution}</div>
      </div>
    </div>` : ''}

    ${secondaryCards ? `
    <div class="r-sec">Additional modules — your full configuration</div>
    ${secondaryCards}` : ''}

    <div class="pricing-card">
      <div class="p-left">
        <div class="p-label">Your SLC Configuration</div>
        <div class="p-price">${price}<span style="font-size:13px;font-weight:400;color:var(--muted)">/mo</span></div>
        <div class="p-period">${arch.tier} tier · based on your friction profile</div>
      </div>
      <div class="p-basis">${priceNote}</div>
      <button class="btn-waitlist" onclick="alert('Waitlist coming soon — thank you for your interest.')">Join the Waitlist →</button>
    </div>

    <button class="btn-restart" onclick="restart()">↺ Retake Diagnostic</button>
  </div>`;
}

function initSpider() {
  const spiderData = FRICTION_CATS.map(cat => ({
    axis: cat.axis,
    score: getAxisScore(cat.id),
    rawScore: cat.items.reduce((a,item) => a + (ST.frx[cat.id]?.[item.id]||0), 0),
    color: cat.color
  }));
  const container = document.getElementById('spider-container');
  if (container) container.innerHTML = buildSpiderSVG(spiderData);
}

// ══════════════════════════════════════════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════════════════════════════════════════
function setDim(id, val) { ST.dims[id] = val; render(); }

function setFrx(catId, itemId, val) {
  if (!ST.frx[catId]) ST.frx[catId] = {};
  ST.frx[catId][itemId] = val;
  render();
}

function next() {
  if (ST.phase === 'p1intro') { ST.phase = 'dim'; ST.dimIdx = 0; }
  else if (ST.phase === 'dim') {
    if (ST.dimIdx < DIMS.length - 1) ST.dimIdx++;
    else ST.phase = 'p2intro';
  }
  else if (ST.phase === 'p2intro') { ST.phase = 'frx'; ST.frxIdx = 0; }
  else if (ST.phase === 'frx') {
    if (ST.frxIdx < FRICTION_CATS.length - 1) ST.frxIdx++;
    else ST.phase = 'result';
  }
  render();
}

function back() {
  if (ST.phase === 'dim') {
    if (ST.dimIdx > 0) ST.dimIdx--;
    else ST.phase = 'p1intro';
  }
  else if (ST.phase === 'p2intro') { ST.phase = 'dim'; ST.dimIdx = DIMS.length - 1; }
  else if (ST.phase === 'frx') {
    if (ST.frxIdx > 0) ST.frxIdx--;
    else ST.phase = 'p2intro';
  }
  render();
}

function restart() {
  ST = { phase:'p1intro', dimIdx:0, dims:{}, frxIdx:0, frx:{} };
  window.scrollTo(0,0);
  render();
}

render();
</script>
