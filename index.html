<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SME Structural Diagnostic Framework</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: var(--card-bg);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        h1, h2, h3 {
            color: var(--text-main);
            margin-top: 0;
        }
        p {
            color: var(--text-muted);
            margin-bottom: 24px;
        }
        .progress-bar {
            width: 100%;
            background-color: var(--border);
            height: 8px;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }
        .question-block {
            display: none;
        }
        .question-block.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }
        .choice-btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            background-color: var(--bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-main);
        }
        .choice-btn:hover {
            border-color: var(--primary);
            background-color: #eff6ff;
        }
        #result-screen {
            display: none;
        }
        .result-code {
            display: inline-block;
            background: var(--text-main);
            color: #fff;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 16px;
        }
        .module-list {
            background: var(--bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-top: 20px;
        }
        .module-list ul {
            margin: 0;
            padding-left: 20px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="intro-screen" class="question-block active">
        <h1>Enterprise Resilience Diagnostic</h1>
        <p>This 25-question forced-choice assessment determines your business's structural and operational reality, classifying you into one of 20 strategic archetypes to prescribe the exact software architecture required.</p>
        <button class="choice-btn" style="text-align: center; background: var(--primary); color: white; border-color: var(--primary);" onclick="startAssessment()">Begin Assessment</button>
    </div>

    <div id="assessment-container" style="display: none;">
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>
        <div id="question-container"></div>
    </div>

    <div id="result-screen">
        <span class="result-code" id="res-code"></span>
        <h1 id="res-title"></h1>
        <p id="res-desc"></p>
        <div class="module-list">
            <h3>Triggered Architecture</h3>
            <p id="res-modules"></p>
        </div>
        <button class="choice-btn" style="text-align: center; margin-top: 20px;" onclick="location.reload()">Retake Diagnostic</button>
    </div>
</div>

<script>
    // 20 Strategic Profiles Dictionary
    const profiles = {
        "P-D-B-O-X": { title: "The Careful Launcher", tier: "Entry", desc: "A founder meticulously planning a physical product release. Frictions revolve around supplier discovery and feasibility.", modules: "Foundational Launchpad modules, ROI simulators, Supplier Logs." },
        "P-S-B-O-X": { title: "The Freelance Initiator", tier: "Entry", desc: "A consultant or creative formalizing a solo practice. Frictions center on defining service value.", modules: "Business Model Canvas, Pitch Deck Agents, Legal Compliance modules." },
        "P-D-B-F-X": { title: "The Ambitious Starter", tier: "Mid", desc: "A well-capitalized product founder preparing an aggressive market entry.", modules: "Pre-launch Budget Allocators, Performance Marketing Campaign Builders." },
        "P-S-B-F-X": { title: "The Market Disruptor", tier: "Mid", desc: "A service provider leveraging heavy initial ad spend to build a client roster immediately upon launch.", modules: "Lead Capture Planning, Go-To-Market (GTM) Simulators." },
        "L-D-B-O-X": { title: "The Steady Product Owner", tier: "Mid", desc: "Operating a live physical goods business but focusing on stabilization rather than rapid growth.", modules: "Basic Inventory Keeping, Order Hubs, Organic Social Media Listening." },
        "L-S-B-O-X": { title: "The Solo Service Operator", tier: "Mid", desc: "A live consultant or tutor managing day-to-day operations. Frictions are purely administrative.", modules: "Quote/Invoice Managers, Appointment Booking." },
        "L-D-B-F-X": { title: "The Emerging Merchant", tier: "Mid", desc: "A live product business utilizing paid ads to secure an initial market foothold.", modules: "Order Management Hubs, Inventory Tracking, Smart Ads Engine." },
        "L-S-B-F-X": { title: "The Promoted Professional", tier: "Mid", desc: "A solo service provider running continuous lead-generation campaigns.", modules: "AI Lead Capture, CRM Lite." },
        "L-D-B-O-E": { title: "The Delegating Merchant", tier: "Mid-High", desc: "A young product business relying heavily on external fulfillment centers or part-time staff.", modules: "Vendor Managers, Capacity Planners." },
        "L-S-B-O-E": { title: "The Boutique Collective", tier: "Mid-High", desc: "A newly formed agency utilizing freelance creative talent.", modules: "Accounts Payable Tracking, AI Meeting Summaries." },
        "L-D-B-F-E": { title: "The Aggressive Operator", tier: "High", desc: "A well-funded product business building its foundation through both an extended team and paid acquisition.", modules: "Capacity Planners, Campaign Attribution Layers." },
        "L-S-B-F-E": { title: "The Scaling Consultancy", tier: "High", desc: "A service firm utilizing paid leads and delegating execution to subcontractors.", modules: "CRM Personalization, Robust Vendor Management." },
        "L-D-G-O-X": { title: "The Growing Product Solo", tier: "Mid-High", desc: "A highly efficient solo operator experiencing rapid organic growth.", modules: "Deep Competitor Monitors, Advanced Logistics Integrations." },
        "L-S-G-O-X": { title: "The Elite Expert", tier: "Mid-High", desc: "A highly sought-after expert scaling revenue through premium pricing rather than volume.", modules: "AI Pricing Optimizers, Advanced Customer Retention Modules." },
        "L-D-G-F-X": { title: "The Performance Product Solo", tier: "High", desc: "An agile e-commerce founder running massive ad campaigns alone.", modules: "Promotion Rules Engine, Deep Marketing Analytics, Automated Inventory Sync." },
        "L-S-G-F-X": { title: "The Digital Course Creator", tier: "High", desc: "A solo digital educator or influencer scaling via aggressive performance marketing.", modules: "Automated Lead Capture, Dynamic CRM Sequences, Behavioural Insights Engines." },
        "L-D-G-O-E": { title: "The Established Retailer", tier: "High", desc: "A mature brand scaling through B2B retail partnerships or vast organic networks.", modules: "Team Scheduling, SOP Knowledge Bases, Multi-node Inventory Logistics." },
        "L-S-G-O-E": { title: "The Scaling Service Team", tier: "High", desc: "A thriving design studio or B2B firm expanding its contractor base.", modules: "Maximum Operational Modules (Capacity Management, Project Profitability)." },
        "L-D-G-F-E": { title: "The Full Stack Operator", tier: "Full", desc: "The maximum physical product configuration. Running complex ad structures and managing external workforces.", modules: "All relevant product and marketing modules actively deployed." },
        "L-S-G-F-E": { title: "The Scaling Agency", tier: "Full", desc: "An enterprise-level agency requiring deep marketing attribution across multiple channels.", modules: "Deep Marketing Attribution, Robust Vendor Management, Comprehensive Financial Forecasting." }
    };

    const questions = [
        // Dimension 1: Stage (P vs L)
        { dim: 'stage', q: "Looking at your calendar for the upcoming week, which statement best describes your primary focus?", c1: { t: "Refining our core concept, securing suppliers, and preparing for market debut.", v: "P" }, c2: { t: "Fulfilling active customer orders, managing cash flow, and operational execution.", v: "L" } },
        { dim: 'stage', q: "Which best describes your customer base?", c1: { t: "We are currently identifying and validating our target audience.", v: "P" }, c2: { t: "We are actively servicing and managing existing client relationships.", v: "L" } },
        { dim: 'stage', q: "What is the current revenue state of the enterprise?", c1: { t: "Pre-revenue; we are investing capital to build the foundation.", v: "P" }, c2: { t: "Actively generating sales and processing transactions.", v: "L" } },
        { dim: 'stage', q: "What dominates your daily tasks?", c1: { t: "Conceptualising, planning, and building the initial framework.", v: "P" }, c2: { t: "Executing daily operations and putting out immediate fires.", v: "L" } },
        { dim: 'stage', q: "What is your immediate 30-day objective?", c1: { t: "Successfully launching the business into the public market.", v: "P" }, c2: { t: "Optimising cash flow and maintaining current operational stability.", v: "L" } },
        
        // Dimension 2: Model (D vs S)
        { dim: 'model', q: "If your business volume suddenly doubled overnight, where would the immediate pressure fall?", c1: { t: "Sourcing physical materials, managing inventory, and shipping logistics.", v: "D" }, c2: { t: "Finding enough hours, scheduling personnel, and maintaining expertise quality.", v: "S" } },
        { dim: 'model', q: "What constitutes your core offering?", c1: { t: "Manufactured goods, retail items, or physical products.", v: "D" }, c2: { t: "Consulting time, digital expertise, or professional services.", v: "S" } },
        { dim: 'model', q: "What is your primary cost driver?", c1: { t: "Raw materials, warehousing, and logistics.", v: "D" }, c2: { t: "Human capital, software tools, and billable hours.", v: "S" } },
        { dim: 'model', q: "How is value delivered to the client?", c1: { t: "Through shipping or physical handover of a tangible item.", v: "D" }, c2: { t: "Through meetings, project deliveries, or ongoing consultation.", v: "S" } },
        { dim: 'model', q: "If a customer complains, what is the most likely source?", c1: { t: "A defective, damaged, or delayed physical item.", v: "D" }, c2: { t: "A misunderstanding of scope, poor advice, or service delay.", v: "S" } },

        // Dimension 3: Growth (B vs G)
        { dim: 'growth', q: "When evaluating your monthly data, what is your most critical definition of success right now?", c1: { t: "Ensuring stable processes and hitting break-even targets.", v: "B" }, c2: { t: "Analysing competitors and aggressively capturing market share.", v: "G" } },
        { dim: 'growth', q: "Where are you directing your reinvestment?", c1: { t: "Building foundational stability and basic operational hygiene.", v: "B" }, c2: { t: "Deploying capital into advanced market intelligence and expansion.", v: "G" } },
        { dim: 'growth', q: "What is your primary operational challenge?", c1: { t: "Establishing a reliable, repeatable baseline of revenue.", v: "B" }, c2: { t: "Managing the chaos and complexity of rapid volume increases.", v: "G" } },
        { dim: 'growth', q: "How would you describe your team's current focus?", c1: { t: "Solidifying our core offering and ensuring customers don't churn.", v: "B" }, c2: { t: "Disrupting the market and scaling as quickly as possible.", v: "G" } },
        { dim: 'growth', q: "What is your current risk appetite?", c1: { t: "Conservative; we need to protect our initial gains and stabilise.", v: "B" }, c2: { t: "Aggressive; we are willing to risk capital to accelerate growth.", v: "G" } },

        // Dimension 4: Marketing (O vs F)
        { dim: 'marketing', q: "How do new, high-value clients predominantly discover your business?", c1: { t: "Through word-of-mouth, organic social posts, and networking.", v: "O" }, c2: { t: "Through tracked digital advertising, KOLs, and paid promotions.", v: "F" } },
        { dim: 'marketing', q: "What does your marketing budget look like?", c1: { t: "Minimal direct spend; we rely on content and community presence.", v: "O" }, c2: { t: "Significant, continuous capital expenditure requiring strict ROAS tracking.", v: "F" } },
        { dim: 'marketing', q: "Which tools are critical for your customer acquisition?", c1: { t: "Basic social media scheduling and standard email broadcasts.", v: "O" }, c2: { t: "Multi-touch attribution engines and dynamic ad targeting platforms.", v: "F" } },
        { dim: 'marketing', q: "How do you generate leads?", c1: { t: "Networking, referrals, and native social engagement.", v: "O" }, c2: { t: "Automated funnels driven by paid traffic acquisition.", v: "F" } },
        { dim: 'marketing', q: "What is your primary visibility strategy?", c1: { t: "Building long-term brand trust and local community presence.", v: "O" }, c2: { t: "Aggressive, targeted digital campaigns aimed at immediate conversion.", v: "F" } },

        // Dimension 5: Ops (X vs E)
        { dim: 'ops', q: "When executing a major project, who is doing the heavy lifting?", c1: { t: "I handle it internally with my tightly-knit core founding unit.", v: "X" }, c2: { t: "I coordinate a sprawling network of external freelancers and vendors.", v: "E" } },
        { dim: 'ops', q: "How complex is your payroll and payout structure?", c1: { t: "Very simple; mostly just paying myself or a small permanent team.", v: "X" }, c2: { t: "Highly complex; requires reconciling multiple contractor invoices.", v: "E" } },
        { dim: 'ops', q: "Where do bottlenecks usually occur?", c1: { t: "My own personal time management and task bandwidth.", v: "X" }, c2: { t: "Cross-party communication breakdowns and external vendor delays.", v: "E" } },
        { dim: 'ops', q: "How do you track workflows?", c1: { t: "Mental notes or simple, centralised to-do lists.", v: "X" }, c2: { t: "Complex project management tools requiring multi-user access.", v: "E" } },
        { dim: 'ops', q: "What is your approach to task delegation?", c1: { t: "I prefer to maintain direct control and execute tasks internally.", v: "X" }, c2: { t: "I actively outsource and delegate to third-party specialists.", v: "E" } }
    ];

    let currentQuestion = 0;
    let scores = { P: 0, L: 0, D: 0, S: 0, B: 0, G: 0, O: 0, F: 0, X: 0, E: 0 };
    let isPreLaunch = false;

    function startAssessment() {
        document.getElementById('intro-screen').classList.remove('active');
        document.getElementById('assessment-container').style.display = 'block';
        renderQuestion();
    }

    function renderQuestion() {
        // Skip logic application
        if (isPreLaunch) {
            // If Pre-launch, skip Growth (Q11-15) and Ops (Q21-25)
            if (currentQuestion >= 10 && currentQuestion <= 14) currentQuestion = 15;
            if (currentQuestion >= 20 && currentQuestion <= 24) currentQuestion = 25;
        }

        if (currentQuestion >= questions.length) {
            calculateResults();
            return;
        }

        const q = questions[currentQuestion];
        const container = document.getElementById('question-container');
        
        // Progress bar logic (adjusted for skipped questions)
        let totalQ = isPreLaunch ? 15 : 25;
        let currentProgress = isPreLaunch && currentQuestion >= 15 ? currentQuestion - 5 : currentQuestion;
        document.getElementById('progress').style.width = `${(currentProgress / totalQ) * 100}%`;

        container.innerHTML = `
            <div class="question-block active">
                <p>Question ${currentProgress + 1} of ${totalQ}</p>
                <h2>${q.q}</h2>
                <button class="choice-btn" onclick="answer('${q.c1.v}')">${q.c1.t}</button>
                <button class="choice-btn" onclick="answer('${q.c2.v}')">${q.c2.t}</button>
            </div>
        `;
    }

    function answer(value) {
        scores[value]++;
        
        // After Dimension 1 (Questions 0-4), determine stage for skip logic
        if (currentQuestion === 4) {
            if (scores.P > scores.L) {
                isPreLaunch = true;
                // Auto-assign logical defaults based on pruning logic
                scores.B = 5; 
                scores.X = 5;
            }
        }
        
        currentQuestion++;
        renderQuestion();
    }

    function calculateResults() {
        const stage = scores.P > scores.L ? 'P' : 'L';
        const model = scores.D > scores.S ? 'D' : 'S';
        const growth = scores.B > scores.G ? 'B' : 'G';
        const marketing = scores.O > scores.F ? 'O' : 'F';
        const ops = scores.X > scores.E ? 'X' : 'E';

        const finalCode = `${stage}-${model}-${growth}-${marketing}-${ops}`;
        const result = profiles[finalCode];

        document.getElementById('assessment-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';

        if(result) {
            document.getElementById('res-code').innerText = `${finalCode} • Tier: ${result.tier}`;
            document.getElementById('res-title').innerText = result.title;
            document.getElementById('res-desc').innerText = result.desc;
            document.getElementById('res-modules').innerText = result.modules;
        } else {
            document.getElementById('res-code').innerText = "Edge Case Detected";
            document.getElementById('res-title').innerText = "Manual Review Required";
            document.getElementById('res-desc').innerText = "Your responses generated a highly unique structural alignment. An architectural consultant is required.";
        }
    }
</script>

</body>
</html>
