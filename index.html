<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLC — Business Diagnostic</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0b0e14;
  --bg2:    #111520;
  --bg3:    #161c2a;
  --bg4:    #1c2336;
  --b:      rgba(255,255,255,0.07);
  --b2:     rgba(255,255,255,0.13);
  --text:   #e2e8f0;
  --muted:  rgba(226,232,240,0.50);
  --dim:    rgba(226,232,240,0.22);
  --blue:   #3b82f6;
  --blue2:  rgba(59,130,246,0.12);
  --blue3:  rgba(59,130,246,0.06);
  --amber:  #f59e0b;
  --amber2: rgba(245,158,11,0.12);
  --rose:   #f43f5e;
  --rose2:  rgba(244,63,94,0.12);
  --green:  #22c55e;
  --green2: rgba(34,197,94,0.10);
  --violet: #8b5cf6;
  --violet2:rgba(139,92,246,0.10);
  --cyan:   #06b6d4;
  --indigo: #6366f1;
  --lime:   #84cc16;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.5;
  min-height:100vh;overflow-x:hidden;
}
.shell{max-width:680px;margin:0 auto;padding:36px 20px 100px;}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;padding-bottom:18px;border-bottom:1px solid var(--b);}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:30px;height:30px;border-radius:7px;background:var(--blue);display:flex;align-items:center;justify-content:center;}
.logo-mark svg{display:block;}
.logo-name{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:13.5px;color:var(--text);letter-spacing:-0.01em;}
.logo-sub{font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.hdr-meta{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;}
.lang-toggle{display:flex;border:1px solid var(--b2);border-radius:6px;overflow:hidden;}
.lang-btn{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.08em;font-weight:600;padding:5px 10px;background:none;border:none;cursor:pointer;color:var(--dim);transition:all .12s;}
.lang-btn.active{background:var(--blue);color:#fff;}
.lang-btn:not(.active):hover{color:var(--muted);}

/* ── PROGRESS ── */
.prog{margin-bottom:32px;}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.prog-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.prog-frac{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);}
.prog-track{height:2px;background:var(--b);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);}

/* ── ANIMATIONS ── */
@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes pulse{0%,100%{opacity:.3;}50%{opacity:.8;}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}

/* ── INTRO ── */
.intro-screen{animation:up .3s ease;}
.intro-eyebrow{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);margin-bottom:16px;font-weight:600;}
.intro-title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:26px;color:var(--text);line-height:1.15;letter-spacing:-0.025em;margin-bottom:12px;}
.intro-sub{font-size:13.5px;color:var(--muted);line-height:1.7;max-width:480px;margin-bottom:32px;}
.intro-steps{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:32px;}
.intro-step{background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:14px 16px;}
.is-num{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--blue);letter-spacing:.06em;margin-bottom:8px;}
.is-title{font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.3;}
.is-desc{font-size:11px;color:var(--muted);line-height:1.5;}
.intro-cta-row{display:flex;align-items:center;gap:16px;}
.intro-note{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.05em;color:var(--dim);}

/* ── DIMENSION QUESTION ── */
.dim-screen{animation:up .22s ease;}
.dim-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:12px;}
.dim-q{background:var(--bg2);border:1px solid var(--b);border-radius:12px;padding:26px 26px 22px;margin-bottom:10px;}
.dim-prompt{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:17px;color:var(--text);line-height:1.4;margin-bottom:5px;letter-spacing:-0.01em;}
.dim-sub{font-size:12px;color:var(--dim);margin-bottom:20px;line-height:1.55;font-style:italic;}
.dim-opts{display:flex;flex-direction:column;gap:8px;}
.dim-opt{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:1px solid var(--b);border-radius:9px;background:var(--bg3);cursor:pointer;transition:all .12s;position:relative;overflow:hidden;}
.dim-opt::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:background .12s;}
.dim-opt:hover{border-color:var(--b2);background:var(--bg4);}
.dim-opt.sel{border-color:rgba(59,130,246,.4);background:var(--blue3);}
.dim-opt.sel::before{background:var(--blue);}
.opt-key{width:24px;height:24px;border-radius:6px;border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);transition:all .12s;margin-top:1px;}
.dim-opt.sel .opt-key{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600;}
.opt-body{flex:1;}
.opt-title{font-weight:600;font-size:13px;color:var(--text);margin-bottom:3px;line-height:1.4;}
.opt-desc{font-size:11.5px;color:var(--muted);line-height:1.5;}

/* ── ARCHETYPE REVEAL ── */
.reveal-screen{animation:up .3s ease;}
.reveal-kicker{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.reveal-card{border-radius:12px;padding:28px 28px 24px;margin-bottom:14px;position:relative;overflow:hidden;background:linear-gradient(135deg,#0f172a 0%,#0d1117 100%);border:1px solid rgba(255,255,255,0.09);box-shadow:0 0 0 1px rgba(59,130,246,0.08),0 8px 32px rgba(0,0,0,0.4);}
.reveal-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--violet),var(--cyan));}
.rc-eyebrow{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,0.28);margin-bottom:10px;}
.rc-name{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:26px;color:#fff;line-height:1.1;letter-spacing:-0.025em;margin-bottom:5px;}
.rc-code{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#60a5fa;letter-spacing:.07em;margin-bottom:16px;}
.rc-desc{font-size:13px;color:rgba(255,255,255,0.55);line-height:1.7;max-width:500px;padding-bottom:18px;}
.rc-dims{display:flex;flex-wrap:wrap;gap:5px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.07);}
.rc-dim{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:4px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.04em;}
.rcd-l{color:rgba(255,255,255,0.28);}
.rcd-v{color:rgba(255,255,255,0.7);font-weight:600;}
.reveal-bridge{background:var(--bg2);border:1px solid var(--b);border-radius:9px;padding:14px 18px;margin-bottom:20px;}
.rb-text{font-size:13px;color:var(--muted);line-height:1.65;}
.rb-text strong{color:var(--text);font-weight:600;}

/* ── FRICTION SCREEN ── */
.frx-screen{animation:up .22s ease;}
.frx-tracker{display:flex;gap:4px;margin-bottom:6px;}
.frx-seg{height:2px;flex:1;border-radius:2px;background:var(--b);position:relative;overflow:hidden;}
.frx-seg.done{background:var(--blue);}
.frx-seg.active::after{content:'';position:absolute;left:0;top:0;bottom:0;width:50%;background:var(--blue);border-radius:2px;animation:pulse 1.6s ease-in-out infinite;}
.frx-tcount{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.06em;color:var(--dim);margin-bottom:18px;text-align:right;}
.frx-hdr{margin-bottom:14px;}
.frx-cat{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:9px;font-weight:600;}
.frx-title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:18px;color:var(--text);margin-bottom:4px;letter-spacing:-0.01em;}
.frx-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:18px;}
.frx-card{background:var(--bg2);border:1px solid var(--b);border-radius:11px;padding:20px 22px;margin-bottom:10px;}
.frx-items{display:flex;flex-direction:column;}
.frx-item{padding:13px 0;border-bottom:1px solid var(--b);}
.frx-item:last-child{border-bottom:none;padding-bottom:0;}
.frx-item:first-child{padding-top:0;}
.frx-stmt{font-size:13px;color:var(--text);line-height:1.55;margin-bottom:10px;font-weight:500;}
.rating-row{display:flex;gap:6px;}
.r-btn{flex:1;padding:8px 6px;border:1px solid var(--b);border-radius:8px;background:var(--bg3);cursor:pointer;transition:all .12s;text-align:center;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;font-size:11.5px;color:var(--muted);line-height:1.3;}
.r-btn:hover{border-color:var(--b2);color:var(--text);}
.r-btn.r0.sel{background:rgba(255,255,255,0.06);border-color:var(--b2);color:var(--dim);}
.r-btn.r1.sel{background:var(--amber2);border-color:rgba(245,158,11,.3);color:var(--amber);}
.r-btn.r2.sel{background:var(--rose2);border-color:rgba(244,63,94,.3);color:var(--rose);}
.frx-done-note{text-align:center;margin-top:8px;font-size:11.5px;color:var(--green);font-weight:600;animation:fadeIn .25s ease;}
.frx-note{text-align:center;margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.06em;color:var(--dim);}

/* ── NAV ── */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:18px;border-top:1px solid var(--b);}
.btn-back{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);background:none;border:none;cursor:pointer;padding:8px 0;transition:color .12s;}
.btn-back:hover{color:var(--muted);}
.btn-back:disabled{opacity:.2;cursor:default;}
.btn-next{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;padding:10px 22px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:5px;}
.btn-next:hover{background:#2563eb;}
.btn-next:disabled{background:var(--bg4);color:var(--dim);cursor:default;}

/* ── AI CHAT SCREEN ── */
.ai-screen{animation:up .22s ease;}
.ai-hdr{margin-bottom:20px;}
.ai-eyebrow{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--violet);margin-bottom:8px;font-weight:600;display:flex;align-items:center;gap:6px;}
.ai-eyebrow::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--violet);flex-shrink:0;animation:blink 2s ease-in-out infinite;}
.ai-title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:18px;color:var(--text);letter-spacing:-0.02em;margin-bottom:4px;}
.ai-sub{font-size:12px;color:var(--muted);line-height:1.6;}
.chat-wrap{background:var(--bg2);border:1px solid var(--b);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.chat-feed{display:flex;flex-direction:column;gap:0;max-height:420px;overflow-y:auto;padding:20px;}
.msg-row{display:flex;flex-direction:column;margin-bottom:16px;}
.msg-row:last-child{margin-bottom:0;}
.msg-role{font-family:'JetBrains Mono',monospace;font-size:7.5px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.msg-role.ai-role{color:var(--violet);}
.msg-role.user-role{color:var(--dim);text-align:right;}
.msg-bubble{padding:13px 16px;border-radius:10px;font-size:13px;line-height:1.65;}
.msg-ai .msg-bubble{background:var(--bg3);border:1px solid var(--b);color:var(--text);border-bottom-left-radius:3px;}
.msg-user{align-items:flex-end;}
.msg-user .msg-bubble{background:var(--blue2);border:1px solid rgba(59,130,246,.25);color:var(--text);border-bottom-right-radius:3px;max-width:85%;}
.typing-row{display:flex;flex-direction:column;margin-bottom:4px;}
.typing-bubble{background:var(--bg3);border:1px solid var(--b);border-radius:10px;border-bottom-left-radius:3px;padding:13px 18px;display:inline-flex;gap:5px;align-items:center;}
.typing-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:blink 1.4s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
.chat-input-area{padding:14px 16px;border-top:1px solid var(--b);display:flex;gap:8px;background:var(--bg2);}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--b2);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;outline:none;resize:none;transition:border-color .12s;min-height:42px;max-height:120px;}
.chat-input:focus{border-color:rgba(59,130,246,.4);}
.chat-input::placeholder{color:var(--dim);}
.btn-send{padding:10px 18px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;transition:all .12s;flex-shrink:0;align-self:flex-end;}
.btn-send:hover{background:#2563eb;}
.btn-send:disabled{background:var(--bg4);color:var(--dim);cursor:default;}
.exchange-warn{text-align:center;padding:8px 16px;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--amber);background:var(--amber2);border-top:1px solid rgba(245,158,11,.15);}
.ai-error-note{background:var(--rose2);border:1px solid rgba(244,63,94,.2);border-radius:8px;padding:12px 16px;margin-bottom:10px;font-size:12px;color:var(--rose);line-height:1.6;}
.ai-complete-note{background:var(--green2);border:1px solid rgba(34,197,94,.2);border-radius:8px;padding:12px 16px;margin-bottom:10px;font-size:12px;color:var(--green);display:flex;align-items:center;gap:8px;}
.btn-skip{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);background:none;border:none;cursor:pointer;padding:6px;transition:color .12s;}
.btn-skip:hover{color:var(--muted);}

/* ── RESULT ── */
.result{animation:up .35s ease;}
.arch-card{background:linear-gradient(135deg,#0f172a 0%,#0d1117 100%);border:1px solid rgba(255,255,255,0.09);border-radius:12px;padding:28px;margin-bottom:4px;position:relative;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.35);}
.arch-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--cyan),var(--violet));}
.arch-kicker{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,0.28);margin-bottom:10px;}
.arch-name{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:22px;color:#fff;line-height:1.15;margin-bottom:4px;letter-spacing:-0.02em;}
.arch-code{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(96,165,250,0.8);letter-spacing:.06em;margin-bottom:14px;}
.arch-desc{font-size:12.5px;color:rgba(255,255,255,0.5);line-height:1.7;max-width:540px;}
.arch-dims{display:flex;flex-wrap:wrap;gap:5px;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.07);}
.arch-dim{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);font-family:'JetBrains Mono',monospace;font-size:7.5px;letter-spacing:.04em;}
.adl{color:rgba(255,255,255,0.28);}
.adv{color:rgba(255,255,255,0.72);font-weight:600;}
.insight-block{background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:18px 20px;margin:10px 0 14px;border-left:3px solid var(--violet);}
.ib-tag{font-family:'JetBrains Mono',monospace;font-size:7.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--violet);margin-bottom:8px;font-weight:600;}
.ib-text{font-size:13px;color:var(--muted);line-height:1.7;}
.ib-text strong{color:var(--text);}
.friction-bridge{background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:14px 18px;margin-bottom:14px;border-left:3px solid var(--rose);}
.fb-tag{font-family:'JetBrains Mono',monospace;font-size:7.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--rose);margin-bottom:5px;font-weight:600;}
.fb-line{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-0.01em;line-height:1.35;margin-bottom:3px;}
.fb-cause{font-size:12px;color:var(--muted);line-height:1.6;}
.spider-wrap{background:var(--bg2);border:1px solid var(--b);border-radius:12px;padding:24px;margin-bottom:12px;}
.spider-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;}
.spider-title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14px;color:var(--text);letter-spacing:-0.01em;}
.spider-sub{font-size:11.5px;color:var(--muted);margin-top:2px;}
.spider-legend{display:flex;flex-direction:column;gap:5px;align-items:flex-end;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--muted);}
.leg-dot{width:7px;height:7px;border-radius:50%;}
.spider-container{display:flex;justify-content:center;margin-bottom:18px;}
svg.spider{overflow:visible;}
.axis-bars{display:flex;flex-direction:column;gap:7px;}
.axis-row{display:flex;align-items:center;gap:10px;}
.axis-name{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);width:82px;flex-shrink:0;text-align:right;}
.axis-track{flex:1;height:3px;background:var(--b);border-radius:2px;overflow:hidden;}
.axis-bar{height:100%;border-radius:2px;}
.axis-pct{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--dim);width:30px;flex-shrink:0;text-align:right;}
.axis-interp{font-size:10.5px;color:var(--muted);width:120px;flex-shrink:0;}
.r-sec{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:20px 0 10px;display:flex;align-items:center;gap:8px;}
.r-sec::after{content:'';flex:1;height:1px;background:var(--b);}
.mod-pri{background:var(--bg2);border:1px solid var(--b2);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;position:relative;overflow:hidden;}
.mod-pri::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--rose);}
.mp-tag{padding:2px 7px;border-radius:4px;background:var(--rose2);font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:.08em;text-transform:uppercase;color:var(--rose);flex-shrink:0;margin-top:2px;font-weight:600;}
.mp-body{flex:1;}
.mp-name{font-weight:700;font-size:12.5px;color:var(--text);margin-bottom:3px;}
.mp-reason{font-size:11.5px;color:var(--muted);line-height:1.5;}
.mod-act{background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;position:relative;overflow:hidden;}
.mod-act::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--amber);}
.ma-tag{padding:2px 7px;border-radius:4px;background:var(--amber2);font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:.08em;text-transform:uppercase;color:var(--amber);flex-shrink:0;margin-top:2px;font-weight:600;}
.ma-body{flex:1;}
.ma-name{font-weight:700;font-size:12.5px;color:var(--text);margin-bottom:3px;}
.ma-reason{font-size:11.5px;color:var(--muted);line-height:1.5;}
.mod-bg{background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:12px 16px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px;position:relative;overflow:hidden;opacity:.65;}
.mod-bg::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--dim);}
.mbg-tag{padding:2px 7px;border-radius:4px;background:rgba(255,255,255,0.04);font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);flex-shrink:0;margin-top:2px;font-weight:600;}
.mbg-body{flex:1;}
.mbg-name{font-weight:600;font-size:12px;color:var(--muted);margin-bottom:2px;}
.mbg-reason{font-size:11px;color:var(--dim);line-height:1.5;}
.pricing-card{background:var(--bg2);border:1px solid rgba(59,130,246,.2);border-radius:12px;padding:22px 24px;margin-top:12px;display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;position:relative;overflow:hidden;}
.pricing-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--blue);}
.p-label{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);margin-bottom:4px;font-weight:600;}
.p-price{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:26px;color:var(--text);line-height:1;}
.p-period{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-top:3px;}
.p-basis{font-size:11.5px;color:var(--muted);line-height:1.6;max-width:240px;}
.btn-waitlist{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;padding:12px 26px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;transition:all .12s;white-space:nowrap;flex-shrink:0;}
.btn-waitlist:hover{background:#2563eb;transform:translateY(-1px);}
.btn-restart{display:block;margin:14px auto 0;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);background:none;border:none;cursor:pointer;transition:color .12s;}
.btn-restart:hover{color:var(--muted);}
.confidence-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:7.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-top:8px;}
.conf-high{background:var(--green2);color:var(--green);}
.conf-standard{background:var(--amber2);color:var(--amber);}

@media(max-width:540px){
  .intro-steps{grid-template-columns:1fr;}

  .axis-interp{display:none;}

}

// STATE — persisted to sessionStorage so refresh restores exactly where you were
// ══════════════════════════════════════════════════════════════════════════════
const SESSION_KEY = 'slc_diagnostic_state';

function saveState() {
  try {
    const toSave = JSON.parse(JSON.stringify(ST));
    toSave.ai.isLoading = false; // never restore a loading spinner
    sessionStorage.setItem(SESSION_KEY, JSON.stringify(toSave));
  } catch(e) {}
}

function loadState() {
  try {
    const raw = sessionStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    // If we were mid-init when saved, show retry button instead of spinner
    if (parsed.phase === 'ai' && !parsed.ai.initialized && !parsed.ai.error) {
      parsed.ai.error = true;
    }
    return parsed;
  } catch(e) { return null; }
}

function getItemsForCat(cat) {
  const model = ST.dims.model || 'D';
  return cat.items.map(item => {
    if (item.swap && item.swap[model]) return Object.assign({},item,{stmt:item.swap[model]});
    return item;
  });
}

function getAxisScore(catId) {
  const cat = getFRX().find(c=>c.id===catId); if(!cat) return 0;
  const ratings = ST.frx[catId]||{};
  const items = getItemsForCat(cat);
  let total=0; items.forEach(item=>{total+=(ratings[item.id]||0);});
  return Math.max(15, Math.round((total/(items.length*2))*100));
}

function getFrxSummary() {
  return getActiveFrxCats().map(cat=>({
    catId:cat.id, axis:cat.axis, color:cat.color,
    score:getAxisScore(cat.id),
    rawScore:getItemsForCat(cat).reduce((a,item)=>a+(ST.frx[cat.id]?.[item.id]||0),0),
  })).sort((a,b)=>b.score-a.score);
}

function isFrxScreenComplete() {
  const activeCats = getActiveFrxCats();
  const cat = activeCats[ST.frxIdx]; if(!cat) return false;
  const ratings = ST.frx[cat.id]||{};
  return getItemsForCat(cat).every(item=>ratings[item.id]!==undefined);
}

function totalScreens() { return 1+getDIMS().length+1+getActiveFrxCats().length+1; }
function currentScreen() {
  if(ST.phase==='p1intro') return 0;
  if(ST.phase==='dim')     return 1+ST.dimIdx;
  if(ST.phase==='p2intro') return 1+getDIMS().length;
  if(ST.phase==='frx')     return 1+getDIMS().length+1+ST.frxIdx;
  if(ST.phase==='ai')      return 1+getDIMS().length+1+getActiveFrxCats().length;
  return totalScreens();
}

function interpText(s) {
  const t=L().interpText;
  if(s<=20)return t.minimal; if(s<=40)return t.low;
  if(s<=60)return t.moderate; if(s<=80)return t.high; return t.critical;
}

function updateProgress() {
  const ui=L().ui;
  const total=totalScreens(); const cur=currentScreen();
  const pct = ST.phase==='result'?100:Math.round((cur/total)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  const labels={p1intro:'',dim:ui.phase1,p2intro:ui.phase1done,frx:ui.phase2,ai:ui.phase3,result:ui.complete};
  document.getElementById('prog-label').textContent=labels[ST.phase]||'';
  const showFrac=(ST.phase==='dim'||ST.phase==='frx');
  document.getElementById('prog-frac').textContent=
    showFrac?`${cur} / ${total}`:ST.phase==='result'?`${total} / ${total}`:'';
}

function render() {
  updateProgress();
  saveState();
  const app=document.getElementById('app');
  if(ST.phase==='p1intro')      app.innerHTML=renderIntro();
  else if(ST.phase==='dim')     app.innerHTML=renderDim();
  else if(ST.phase==='p2intro') app.innerHTML=renderReveal();
  else if(ST.phase==='frx')     app.innerHTML=renderFrx();
  else if(ST.phase==='ai')      {app.innerHTML=renderAI();bindChat();}
  else if(ST.phase==='result')  {app.innerHTML=renderResult();initSpider();}
  window.scrollTo(0,0);
}

function bindChat() {
  const feed=document.getElementById('chat-feed');
  if(feed) feed.scrollTop=feed.scrollHeight;
  const input=document.getElementById('chat-input');
  if(input){
    input.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';});
    if(!ST.ai.isLoading&&!ST.ai.isComplete) input.focus();
  }
}

// ── SPIDER SVG ────────────────────────────────────────────────────────────────
function buildSpiderSVG(scores) {
  const N=scores.length,CX=180,CY=180,R=135;
  const angles=scores.map((_,i)=>(i/N)*2*Math.PI-Math.PI/2);
  const pt=(r,i)=>({x:CX+r*Math.cos(angles[i]),y:CY+r*Math.sin(angles[i])});
  const rings=[.25,.5,.75,1].map(r=>{
    const pts=scores.map((_,i)=>pt(R*r,i));
    return `<polygon points="${pts.map(p=>`${p.x},${p.y}`).join(' ')}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;
  }).join('');
  const axes=scores.map((_,i)=>{const p=pt(R,i);
    return `<line x1="${CX}" y1="${CY}" x2="${p.x}" y2="${p.y}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;
  }).join('');
  const dataPts=scores.map((s,i)=>pt(R*(s.score/100),i));
  const poly=dataPts.map(p=>`${p.x},${p.y}`).join(' ');
  const dots=dataPts.map((p,i)=>{
    const hi=scores[i].score>=60;
    return `<circle cx="${p.x}" cy="${p.y}" r="${hi?5:3}" fill="${hi?scores[i].color:'rgba(255,255,255,0.2)'}" opacity="${hi?1:.6}"/>`;
  }).join('');
  const labels=scores.map((s,i)=>{
    const p=pt(R*1.24,i); const hi=s.score>=60;
    return `<text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="middle"
      font-family="JetBrains Mono,monospace" font-size="9" font-weight="${hi?'600':'400'}"
      letter-spacing=".08em" fill="${hi?s.color:'rgba(226,232,240,0.3)'}"
    >${s.axis.toUpperCase()}</text>`;
  }).join('');
  const pctLabels=dataPts.map((p,i)=>{
    if(!scores[i].rawScore) return '';
    return `<text x="${p.x}" y="${p.y-10}" text-anchor="middle"
      font-family="JetBrains Mono,monospace" font-size="8" fill="${scores[i].color}" opacity=".85"
    >${scores[i].score}%</text>`;
  }).join('');
  return `<svg class="spider" width="360" height="360" viewBox="0 0 360 360">
    <defs><radialGradient id="sg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(59,130,246,0.14)"/>
      <stop offset="100%" stop-color="rgba(59,130,246,0.02)"/>
    </radialGradient></defs>
    ${rings}${axes}
    <polygon points="${poly}" fill="url(#sg)" stroke="rgba(59,130,246,0.55)" stroke-width="1.5" stroke-linejoin="round"/>
    ${dots}${pctLabels}${labels}
  </svg>`;
}

// ── RESULT ────────────────────────────────────────────────────────────────────
function renderResult() {
  const ui=L().ui; const l=L();

  const vertical=ST.dims.vertical||''; const vertLabel=getVerticalLabel();
  const fullCode=vertical?`${code} · ${vertical}`:code;
  const res=ST.ai.resultData;
  const tier=res?.tier_confirmed||arch.tier;
  const price=TIER_PRICE[tier]||'฿4,900';
  const confidence=res?.confidence||'standard';
  const dimLabels=getDimLabels();
  const dimKeys=['stage','model','vertical','growth','marketing','ops'];
  const dimPills=dimKeys.filter(k=>ST.dims[k]).map(k=>
    `<div class="arch-dim"><span class="adl">${k}</span><span class="adv">${dimLabels[k]?.[ST.dims[k]]||ST.dims[k]}</span></div>`
  ).join('');
  const summary=getFrxSummary();
  const spiderData=getActiveFrxCats().map(cat=>({
    axis:cat.axis, score:getAxisScore(cat.id), color:cat.color,
    rawScore:getItemsForCat(cat).reduce((a,i)=>a+(ST.frx[cat.id]?.[i.id]||0),0)
  }));
  function barColor(s){return s<=30?'#4f46e5':s<=55?'#f59e0b':'#f43f5e';}
  const axisBars=[...spiderData].sort((a,b)=>b.score-a.score).map(s=>
    `<div class="axis-row">
      <div class="axis-name">${s.axis}</div>
      <div class="axis-track"><div class="axis-bar" style="width:${s.score}%;background:${barColor(s.score)};"></div></div>
      <div class="axis-pct">${s.score}%</div>
      <div class="axis-interp">${interpText(s.score)}</div>
    </div>`
  ).join('');

  const insightHtml=res?.personalised_insight
    ?`<div class="insight-block">
        <div class="ib-tag">${ui.piTag}</div>
        <div class="ib-text">${res.personalised_insight}</div>
        <div class="confidence-badge ${confidence==='high'?'conf-high':'conf-standard'}">
          ${confidence==='high'?ui.confHigh:ui.confStd}

      </div>`
    :`<div class="insight-block" style="border-left-color:var(--rose);">
        <div class="ib-tag" style="color:var(--rose);">${ui.primarySignal}</div>
        <div class="ib-text">${l.fallbackInsight(summary[0]?.axis,summary[0]?.score)}</div>

    ?`<div class="friction-bridge">
        <div class="fb-tag">${ui.primaryFriction}${res.primary_friction}</div>

        ${res.secondary_friction?`<div class="fb-cause" style="margin-top:6px;">${ui.secondary}<strong>${res.secondary_friction}</strong> — ${res.secondary_cause||''}</div>`:''}

    if(!list||!list.length) return '';

      <div class="mp-tag">${ui.priorityTag}</div>
      <div class="mp-body"><div class="mp-name">${m.name}</div><div class="mp-reason">${m.reason||''}</div></div>
    </div>`).join('');

      <div class="ma-tag">${ui.activeTag}</div>
      <div class="ma-body"><div class="ma-name">${m.name}</div><div class="ma-reason">${m.reason||''}</div></div>
    </div>`).join('');
    if(type==='background') return list.map(m=>`<div class="mod-bg">
      <div class="mbg-tag">${ui.monitorTag}</div>
      <div class="mbg-body"><div class="mbg-name">${m.name}</div><div class="mbg-reason">${m.reason||''}</div></div>

  const mp=res?.module_prescription;
  const priorityHtml=mp?.priority?.length?`<div class="r-sec">${ui.priorityModules}</div>${renderModules(mp.priority,'priority')}`:'';
  const activeHtml=mp?.active?.length?`<div class="r-sec">${ui.activeModules}</div>${renderModules(mp.active,'active')}`:'';
  const backgroundHtml=mp?.background?.length?`<div class="r-sec">${ui.bgModules}</div>${renderModules(mp.background,'background')}`:'';

  return `<div class="result">
    <div class="arch-card">
      <div class="arch-kicker">${ui.diagResult} ${fullCode}</div>
      <div class="arch-name">${arch.name}</div>
      <div class="arch-code">${fullCode} · ${tier} ${ui.configuration}</div>
      <div class="arch-desc">${arch.desc}</div>
      <div class="arch-dims">${dimPills}</div>
    </div>
    ${insightHtml}${bridgeHtml}
    <div class="spider-wrap">
      <div class="spider-head">
        <div>
          <div class="spider-title">${ui.frictionProfile}</div>
          <div class="spider-sub">${ui.allAxes}</div>
        </div>
        <div class="spider-legend">
          <div class="leg-item"><div class="leg-dot" style="background:var(--rose)"></div>${ui.high}</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--amber)"></div>${ui.moderate}</div>
          <div class="leg-item"><div class="leg-dot" style="background:var(--indigo)"></div>${ui.low}</div>
        </div>
      </div>
      <div class="spider-container" id="spider-container"></div>
      <div class="axis-bars">${axisBars}</div>
    </div>
    ${priorityHtml}${activeHtml}${backgroundHtml}

      <div>
        <div class="p-label">${ui.yourPlan}</div>
        <div class="p-price">${price}<span style="font-size:13px;font-weight:400;color:var(--muted)">${ui.perMonth}</span></div>
        <div class="p-period">${tier} · ${flagged} ${ui.of} ${getActiveFrxCats().length} ${ui.flagged}</div>
      </div>
      <div class="p-basis">${ui.configBuilt}</div>
      <button class="btn-waitlist" onclick="alert('${isTH()?'กำลังเปิดรายชื่อรอเร็วๆ นี้':'Waitlist coming soon.'}')">${ui.joinWaitlist}</button>
    </div>
    <button class="btn-restart" onclick="restart()">${ui.retake}</button>
  </div>`;
}

function initSpider() {
  const data=getActiveFrxCats().map(cat=>({
    axis:cat.axis, score:getAxisScore(cat.id), color:cat.color,
    rawScore:getItemsForCat(cat).reduce((a,i)=>a+(ST.frx[cat.id]?.[i.id]||0),0)
  }));
  const c=document.getElementById('spider-container');
  if(c) c.innerHTML=buildSpiderSVG(data);
}

function buildFrictionContextForAI() {
  const result={};
  getActiveFrxCats().forEach(cat=>{
    // Always pass EN axis names to AI for consistent processing
    const enCat = FRICTION_CATS_EN.find(c=>c.id===cat.id);
    const axisKey = enCat?enCat.axis:cat.axis;
    const items=getItemsForCat(cat);
    const ratings=ST.frx[cat.id]||{};
    const score=getAxisScore(cat.id);
    const statements={};
    items.forEach(item=>{statements[item.id]=ratings[item.id]!==undefined?ratings[item.id]:0;});
    result[axisKey]={score,statements};
  });
  return result;
}

function buildSystemPrompt() {
  const arch=getArchetype(); const code=getArchCode();
  const vertLabel=getVerticalLabel(); const frxData=buildFrictionContextForAI();
  const isSolo=ST.dims.ops==='X';
  const sortedCats=Object.entries(frxData).sort((a,b)=>b[1].score-a[1].score).map(([cat,data])=>`${cat}: ${data.score}%`).join(', ');
  const lang=ST.lang;

  return `You are the SLC Business Advisor — an AI diagnostic specialist for Thai small and medium businesses. You conduct focused, intelligent interviews to understand the specific operational reality behind a business owner's friction signals.

You are not a general assistant. You do not answer questions outside your scope. You are conducting a diagnostic interview that will determine which SLC modules are activated for this specific business.

LANGUAGE INSTRUCTION: The user's interface language is ${lang}. ${lang==='TH'?'Conduct the entire conversation in Thai (ภาษาไทย). Use natural, professional Thai that a Thai SME owner would use daily. Do not switch to English mid-conversation.':'Conduct the conversation in English.'}

Your persona:
- Warm but precise. You ask one question at a time, clearly.
- You speak as someone who understands Thai SME reality — you know about supplier relationships, cash flow pressure, family business dynamics, platform-based selling, and regulatory obligations.
- You never use jargon the owner would not recognise.
- You never say 'module', 'SLC', 'Layer 2', or 'friction score' to the user.
- You speak as if you have been listening carefully and want to understand more.

CONVERSATION RULES — follow these without exception:
1. ASK ONE QUESTION AT A TIME. Never ask two questions in one message.
2. WORK THROUGH CATEGORIES IN ORDER — highest friction score first. Spend 2-3 questions on categories scoring above 60%. Spend 1 question on categories scoring 40-59%. Acknowledge but do not probe categories scoring below 40%.
3. OPEN WITH A BRIDGING STATEMENT, NOT A QUESTION. Your first message must acknowledge what the owner has already shared and frame what comes next — without revealing the scoring system.
4. USE THE ARCHETYPE CONTEXT TO PERSONALISE. Reference their specific vertical and operational reality in every question.
5. LISTEN FOR CAUSES, NOT SYMPTOMS. The friction score tells you WHERE it hurts. Your job is to find out WHY.
6. NEVER OFFER SOLUTIONS DURING THE INTERVIEW.
7. ACKNOWLEDGE ANSWERS BRIEFLY BEFORE THE NEXT QUESTION. One sentence maximum.
8. TRACK YOUR QUESTION BUDGET. Total budget: 12-15 exchanges. If you reach exchange 12, wrap up at exchange 13. Never exceed 15.
9. END WITH THE CONCLUSION PROTOCOL when you have enough signal or hit the budget.
10. HARD BOUNDARIES: Never recommend specific third-party apps. Never give legal or tax advice. Never tell the owner their business is failing. Never reveal scores, percentages, or archetype codes. Never make the owner feel judged.

WHEN TO CONCLUDE — output the result when:
- All categories above 40% have been probed and root causes identified
- Exchange count reaches 12 (wrap at 13)
- Exchange count reaches 15 (conclude immediately)
- User explicitly asks for the result
- User gives disengaged answers twice in a row

CLOSING MESSAGE: ${lang==='TH'?
  `ก่อน JSON เขียนว่า: 'นั่นคือสิ่งที่ฉันต้องการ จากทุกสิ่งที่คุณแบ่งปัน — โปรไฟล์และรายละเอียดที่คุณเพิ่งบอก — ฉันกำลังรวบรวมการกำหนดค่าของคุณ พื้นที่ที่ธุรกิจของคุณต้องการความสนใจมากที่สุดคือ [พื้นที่ 2-3 อันดับแรกในภาษาธรรมดา] ผลลัพธ์เต็มรูปแบบของคุณจะแสดงว่าเครื่องมือใดแก้ไขแต่ละอย่าง และทำไม'` :
  `Before the JSON, write: 'That gives me what I need. Based on everything you have shared — your profile and the specifics you have just walked me through — I am putting together your configuration now. The areas where your business needs the most attention are [top 2-3 areas in plain language]. Your full result will show exactly which tools address each one, and why.'`}

Then immediately output the structured JSON (hidden from user — application parses it):
<!--SLC_RESULT_START-->
{
  "module_prescription": {
    "priority": [{"id": "cashflow", "name": "Rolling Cash Flow Forecast", "reason": "No forward cash visibility"}],
    "active": [{"id": "orderhub", "name": "Order Management Hub", "reason": "No single tracking system"}],
    "background": [{"id": "okr", "name": "OKR / Goal Tracker", "reason": "Low friction score — monitor"}]
  },
  "personalised_insight": "Your business is...",
  "primary_friction": "Finance",
  "primary_cause": "Unknown margin combined with no forward cash visibility",
  "secondary_friction": "Operations",
  "secondary_cause": "No single order tracking system",
  "confidence": "high",
  "tier_confirmed": "${arch.tier}",
  "conversation_exchanges": 0

<!--SLC_RESULT_END-->

=== DIAGNOSTIC CONTEXT ===
BUSINESS PROFILE:
Archetype: ${arch.name} (${code})
Vertical: ${vertLabel}

FRICTION SCORES (0-100, higher = more friction):
${Object.entries(frxData).map(([cat,data])=>`${cat}: ${data.score}%`).join('\n')}

PRIORITY ORDER (sorted by score, highest first):
${sortedCats}

DETAILED FRICTION DATA:
${JSON.stringify(frxData,null,2)}
${isSolo?'\nNOTE: This is a SOLO (X) archetype — no staff. Do not probe People & Team questions.':''}

Begin the conversation now with your opening bridging statement.`;
}

async function callGeminiAPI() {
  // v1 stable endpoint + gemini-2.0-flash
  // System prompt is injected as a priming user/model exchange (works on v1 without systemInstruction field)
  const systemMsg = buildSystemPrompt();
  const historyMsgs = ST.ai.history.map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: m.content }]
  }));
  const contents = [
    { role: 'user',  parts: [{ text: 'SYSTEM CONTEXT (read and follow exactly):\n' + systemMsg + '\n\nAcknowledge you understand your role.' }] },
    { role: 'model', parts: [{ text: 'Understood. I am the SLC Business Advisor. I will follow all rules exactly and begin when ready.' }] },
    ...historyMsgs
  ];
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents, generationConfig: { maxOutputTokens: 1200, temperature: 0.7 } })
    }
  );
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API error ${res.status}`);
  }
  const data = await res.json();
  return data.candidates[0].content.parts[0].text;
}

function extractResultJSON(text) {
  const match=text.match(/<!--SLC_RESULT_START-->([\s\S]*?)<!--SLC_RESULT_END-->/);
  if(!match) return null;
  try{return JSON.parse(match[1].trim());}catch(e){console.error('Result parse error:',e);return null;}
}

async function startAIConversation() {
  const ai=ST.ai; if(ai.initialized) return;
  ai.history.push({role:'user',content:'Ready.',_hidden:true});
  ai.isLoading=true; render();
  try{
    const msg=await callGeminiAPI();
    ai.history.push({role:'assistant',content:msg});
    ai.initialized=true;
    if(msg.includes('<!--SLC_RESULT_START-->')){
      const json=extractResultJSON(msg);
      if(json){ai.resultData=json;ai.isComplete=true;}
    }
  }catch(e){console.error('AI init error:',e);ai.error=true;}
  ai.isLoading=false; render();
}

async function doSend() {
  const input=document.getElementById('chat-input');
  if(!input) return;
  const text=input.value.trim();
  if(!text||ST.ai.isLoading||ST.ai.isComplete) return;
  input.value=''; input.style.height='auto';
  const ai=ST.ai;
  ai.history.push({role:'user',content:text});
  ai.exchangeCount++;
  if(ai.exchangeCount>=12) ai.nearEnd=true;
  ai.isLoading=true; render();
  try{
    const msg=await callGeminiAPI();
    ai.history.push({role:'assistant',content:msg});
    if(msg.includes('<!--SLC_RESULT_START-->')){
      const json=extractResultJSON(msg);
      if(json){ai.resultData=json;ai.isComplete=true;}
    }
  }catch(e){
    console.error('AI send error:',e);
    ai.error=true; ai.resultData=generateFallbackPrescription(); ai.isComplete=true;
  }
  ai.isLoading=false; render();
  if(ai.isComplete) setTimeout(()=>{goToResult();},2200);
}

function goToResult() {
  if(!ST.ai.resultData) ST.ai.resultData=generateFallbackPrescription();
  ST.phase='result'; render();
}

function retryAI() {
  // Reset only the AI portion — preserve all dims and friction answers
  ST.ai = {history:[],exchangeCount:0,isComplete:false,resultData:null,
            isLoading:false,initialized:false,nearEnd:false,error:false};
  render();
  setTimeout(()=>startAIConversation(), 150);
}

function generateFallbackPrescription() {
  const summary=getFrxSummary(); const arch=getArchetype(); const l=L();
  const priority=[],active=[],background=[];
  summary.forEach(cat=>{
    const mods=FALLBACK_MODULES[cat.axis]||[];
    if(cat.score>=60) mods.slice(0,2).forEach(m=>priority.push({...m,reason:l.fallbackReason(cat.score,cat.axis)}));
    else if(cat.score>=40) mods.slice(0,1).forEach(m=>active.push({...m,reason:l.fallbackFallback(cat.score,cat.axis)}));
    else mods.slice(0,1).forEach(m=>background.push({...m,reason:l.fallbackBg}));
  });
  const top=summary[0];
  return {
    module_prescription:{priority,active,background},
    personalised_insight:l.fallbackInsightFull(arch.name,top?.axis,top?.score),
    primary_friction:top?.axis,primary_cause:l.fallbackCause,
    confidence:'standard',tier_confirmed:arch.tier
  };
}

// ══════════════════════════════════════════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════════════════════════════════════════
function setDim(id,val){
  if(id==='model') delete ST.dims.vertical;
  ST.dims[id]=val; render();
}
function setFrx(catId,itemId,val){
  if(!ST.frx[catId]) ST.frx[catId]={};
  ST.frx[catId][itemId]=val; render();
}
function skipAI(){
  ST.ai.resultData=generateFallbackPrescription();
  ST.ai.isComplete=true; ST.phase='result'; render();
}
function showFallbackResult(){
  ST.ai.resultData=generateFallbackPrescription(); ST.phase='result'; render();
}

function next() {
  const dims=getDIMS();
  if(ST.phase==='p1intro'){ST.phase='dim';ST.dimIdx=0;}
  else if(ST.phase==='dim'){
    if(ST.dimIdx<dims.length-1) ST.dimIdx++;
    else ST.phase='p2intro';
  }
  else if(ST.phase==='p2intro'){ST.phase='frx';ST.frxIdx=0;}
  else if(ST.phase==='frx'){
    const activeCats=getActiveFrxCats();
    if(ST.frxIdx<activeCats.length-1){ST.frxIdx++;render();return;}
    else{
      ST.phase='ai'; render();
      setTimeout(()=>startAIConversation(),150);
      return;
    }
  }
  render();
}

function back(){
  const dims=getDIMS();
  if(ST.phase==='dim'){
    if(ST.dimIdx>0) ST.dimIdx--;
    else ST.phase='p1intro';
  }
  else if(ST.phase==='p2intro'){ST.phase='dim';ST.dimIdx=dims.length-1;}
  else if(ST.phase==='frx'){
    if(ST.frxIdx>0) ST.frxIdx--;
    else ST.phase='p2intro';
  }
  render();
}

function restart(){
  const lang = ST.lang;
  sessionStorage.removeItem(SESSION_KEY);
  ST={phase:'p1intro',dimIdx:0,dims:{},frxIdx:0,frx:{},lang,
      ai:{history:[],exchangeCount:0,isComplete:false,resultData:null,
          isLoading:false,initialized:false,nearEnd:false,error:false}};
  window.scrollTo(0,0); render();
}

// On load: apply lang toggle visuals from restored state
applyLangUI();
render();
// If restored to AI phase and not yet initialized, auto-retry
if (ST.phase === 'ai' && !ST.ai.initialized && !ST.ai.error) {
  setTimeout(()=>startAIConversation(), 200);
}
